<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>바른상자 ERP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;min-height:100vh;}
input,select,textarea{background:#fff;color:#1a1a1a;border:1px solid #d0d0cc;border-radius:6px;padding:7px 10px;font-size:13px;width:100%;outline:none;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:#555;box-shadow:0 0 0 2px rgba(0,0,0,0.06);}
label{font-size:11px;color:#888;display:block;margin-bottom:3px;font-weight:500;}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:1rem 1.25rem;margin-bottom:10px;}
.btn{padding:7px 16px;border:1px solid #d0d0cc;border-radius:6px;background:#fff;color:#1a1a1a;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all 0.15s;}
.btn:hover{background:#f5f5f3;}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.btn-primary:hover{background:#333;}
.btn-sm{padding:4px 10px;font-size:12px;}
.btn-danger{color:#c0392b;border-color:#f5c6c6;}
.btn-danger:hover{background:#fff5f5;}
.btn-success{background:#1e7e34;color:#fff;border-color:#1e7e34;}
.sec{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.field{margin-bottom:10px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500;}
.badge-blue{background:#e8f0fe;color:#1a56c4;}
.badge-green{background:#e6f4ea;color:#1e7e34;}
.badge-gray{background:#f1f1ee;color:#666;}
.badge-amber{background:#fff3e0;color:#e65100;}
.badge-red{background:#fce8e6;color:#c0392b;}
.tab-bar{display:flex;border-bottom:1px solid #e8e8e4;margin-bottom:1.25rem;overflow-x:auto;}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:#888;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;font-family:inherit;}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500;}
.tab:hover:not(.active){background:#f5f5f3;}
.crow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0ee;}
.crow:last-child{border-bottom:none;}
.loading{display:flex;align-items:center;justify-content:center;padding:3rem;color:#aaa;font-size:14px;gap:8px;}
/* 공정 */
.pc{border:1px solid #e8e8e4;border-radius:8px;margin-bottom:7px;background:#fff;}
.pc.dov{border:2px dashed #378ADD;background:#f0f7ff;}
.pch{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#f8f8f6;border-radius:8px 8px 0 0;border-bottom:1px solid #e8e8e4;}
.pcb{padding:11px 13px;}
.pb{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;}
.tj{background:#e6f7f0;color:#0d6e4f;}.tp{background:#e8f0fe;color:#1a56c4;}.tc{background:#fff3e0;color:#c16200;}.tf{background:#fff3e0;color:#c16200;}.th{background:#e8f5e9;color:#2d7d32;}.tt{background:#f5f5f3;color:#555;}.ts{background:#ede7f6;color:#512da8;}.tje{background:#fce8e6;color:#b71c1c;}.ta{background:#fce4ec;color:#880e4f;}.tca{background:#e0f7fa;color:#0e7490;}.tma{background:#f5ede6;color:#7c5c3e;}.tpy{background:#fce7f3;color:#be185d;}.td{background:#f5f5f3;color:#333;}
.dh{cursor:grab;color:#aaa;font-size:16px;user-select:none;}
.gb{padding:4px 9px;font-size:12px;border:1px solid #d0d0cc;border-radius:6px;cursor:pointer;background:#f5f5f3;color:#888;font-family:inherit;}
.gb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.jr{display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap;margin-bottom:6px;}
.ju{font-size:13px;color:#888;padding-bottom:8px;}
.jp{font-size:12px;padding:5px 10px;background:#f5f5f3;border-radius:6px;font-weight:500;margin-top:5px;}
.ra{font-size:10px;padding:1px 5px;border-radius:8px;background:#e6f4ea;color:#2d7d32;}
.rm{font-size:10px;padding:1px 5px;border-radius:8px;background:#fff3e0;color:#c16200;}
.aw{position:relative;display:inline-block;}
.am{position:absolute;top:100%;left:0;z-index:100;background:#fff;border:1px solid #d0d0cc;border-radius:8px;min-width:170px;overflow:hidden;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,0.12);}
.ai{padding:8px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}
.ai:hover{background:#f5f5f3;}
.ad{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fb{display:flex;align-items:center;flex-wrap:wrap;gap:3px;padding:8px 10px;background:#f5f5f3;border-radius:6px;margin-top:6px;min-height:34px;}
.fc{font-size:11px;padding:2px 8px;border-radius:10px;}
.fa{font-size:11px;color:#aaa;}
.dw{margin-top:4px;}
/* 발주 목록 */
.order-group{border:1px solid #e8e8e4;border-radius:10px;margin-bottom:8px;overflow:hidden;}
.order-group-header{padding:12px 16px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:10px;}
.order-group-header:hover{background:#f8f8f6;}
.order-row{padding:10px 16px 10px 16px;border-top:1px solid #f0f0ee;display:grid;grid-template-columns:2.5fr 1.5fr 0.8fr 0.7fr 0.8fr auto auto;gap:10px;align-items:center;background:#fafaf8;}
.order-row:hover{background:#f5f5f3;}
/* 업체별 진행현황 */
.vendor-card{border:1px solid #e8e8e4;border-radius:10px;margin-bottom:8px;overflow:hidden;}
.vendor-header{padding:10px 14px;background:#fff;display:flex;align-items:center;gap:10px;cursor:pointer;}
.vendor-header:hover{background:#f8f8f6;}
.proc-step{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:12px;cursor:pointer;border-radius:6px;transition:all 0.15s;}
.proc-step:hover{background:#f5f5f3;}
.proc-step.done{background:#e6f4ea;}
.proc-step.current{background:#e8f0fe;font-weight:500;}
.proc-check{width:16px;height:16px;border-radius:50%;border:1.5px solid #d0d0cc;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all 0.15s;}
.proc-check.done{background:#1e7e34;border-color:#1e7e34;color:#fff;}
.proc-check.current{border-color:#1a56c4;}
/* 출고달력 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-hd{text-align:center;font-size:11px;color:#888;padding:4px;font-weight:600;}
.cal-day{min-height:80px;border:1px solid #e8e8e4;border-radius:6px;padding:4px;background:#fff;position:relative;}
.cal-day.today{border-color:#1a1a1a;}
.cal-day.other{background:#f8f8f6;opacity:0.5;}
.cal-num{font-size:12px;color:#888;margin-bottom:3px;}
.cal-day.today .cal-num{font-weight:700;color:#1a1a1a;}
.cal-item{font-size:10px;cursor:grab;padding:2px 5px;border-radius:3px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-item:hover{opacity:0.8;}
/* 카톤 재고 */
.stock-bar-wrap{flex:1;height:6px;background:#f0f0ee;border-radius:3px;overflow:hidden;}
.stock-bar{height:100%;border-radius:3px;transition:width 0.3s;}
/* 작업요청서 출력 */
.ws-out{background:white;color:#111;font-size:12px;border:1px solid #bbb;border-radius:6px;overflow:hidden;max-width:720px;margin:0 auto;}
.ws-top{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid #111;}
.ws-l{padding:14px 16px;border-right:1px solid #ccc;}
.ws-r{padding:14px 16px;}
.wt{font-size:20px;font-weight:800;letter-spacing:5px;text-align:center;margin-bottom:4px;}
.wi{display:grid;grid-template-columns:60px 1fr;gap:3px 8px;margin-top:8px;font-size:11px;}
.wl{color:#666;}.wv{font-weight:500;}
.wp{display:grid;grid-template-columns:70px 1fr;gap:4px 8px;font-size:11px;}
.wb{border-top:2px solid #111;}
.wbh{display:grid;grid-template-columns:2fr 1.2fr 2.5fr 1.8fr 1.3fr;background:#f0f0f0;border-bottom:1px solid #bbb;}
.wbh span{padding:6px 8px;font-size:11px;font-weight:700;border-right:1px solid #bbb;}
.wbh span:last-child{border-right:none;}
.wbr{display:grid;grid-template-columns:2fr 1.2fr 2.5fr 1.8fr 1.3fr;border-bottom:1px solid #ddd;}
.wbr:last-child{border-bottom:none;}
.wbr span{padding:6px 8px;font-size:11px;border-right:1px solid #ddd;word-break:keep-all;}
.wbr span:last-child{border-right:none;}
.wbr:nth-child(even){background:#fafafa;}
.wf{padding:8px 14px;border-top:1px solid #bbb;font-size:10px;color:#888;display:flex;justify-content:space-between;}
#app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px;}
.logo{font-size:18px;font-weight:700;}
.logo span{font-size:12px;font-weight:400;color:#888;margin-left:8px;}

/* ══ 모바일 반응형 ══ */
@media (max-width: 768px) {
  /* 헤더 */
  #top-bar {
    padding: 10px 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .logo { font-size: 14px; }

  /* 탭바 - 가로 스크롤 */
  .tab-bar {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: nowrap !important;
    padding: 0 8px;
    gap: 2px;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    white-space: nowrap;
    padding: 8px 12px;
    font-size: 12px;
    flex-shrink: 0;
  }

  /* 패널 */
  #app > div[id^="panel-"] {
    padding: 12px;
  }

  /* 그리드 → 1열 */
  .g2, .g3 { grid-template-columns: 1fr !important; }

  /* 발주 목록 행 */
  .order-row {
    grid-template-columns: 1fr auto !important;
    grid-template-rows: auto auto auto;
    gap: 6px !important;
    padding: 12px !important;
  }
  .order-row > div:nth-child(2) { grid-column: 1 / -1; } /* 공정흐름 전체 너비 */
  .order-row > div:nth-child(3) { display: none; }        /* 담당자 숨김 */
  .order-row > div:nth-child(4) { display: none; }        /* 납기일 숨김 - 제품명에 포함 */

  /* 카드 */
  .card { padding: 12px; margin-bottom: 10px; }

  /* crow 행 */
  .crow { flex-wrap: wrap; gap: 6px; }

  /* 모달 */
  .modal-inner, #app > div[style*="border-radius:12px"] {
    width: 95% !important;
    max-width: 95% !important;
    padding: 1rem !important;
  }

  /* 발주 폼 그리드 */
  .g2 { gap: 8px; }

  /* 버튼 크기 */
  .btn { padding: 6px 12px; font-size: 12px; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  /* 업체별 현황 vendor card */
  .vendor-card { margin-bottom: 8px; }

  /* 생산현황판 KPI */
  .d-kpi-row {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 8px !important;
  }
  .d-mid-row, .d-bot-row {
    grid-template-columns: 1fr !important;
    gap: 10px !important;
  }
  .d-pipe-grid {
    grid-template-columns: repeat(4, 1fr) !important;
  }

  /* 출고관리 달력 */
  .cal-grid {
    grid-template-columns: repeat(7, 1fr) !important;
  }
  .cal-day { min-height: 50px !important; font-size: 11px; }
  .cal-item { font-size: 9px !important; padding: 1px 3px !important; }

  /* 일별 출고 2열 → 1열 */
  .d-grid-2col { grid-template-columns: 1fr !important; }

  /* 발주 목록 검색/필터 영역 */
  .list-filter-bar { flex-wrap: wrap !important; gap: 6px !important; }

  /* 목형 테이블 */
  table { font-size: 11px; }
  table th, table td { padding: 6px 8px !important; }

  /* 숨길 컬럼 */
  .hide-mobile { display: none !important; }
}

@media (max-width: 480px) {
  /* 초소형 화면 */
  .d-kpi-row {
    grid-template-columns: 1fr 1fr !important;
  }
  .d-kpi { padding: 10px !important; }
  .d-kpi-val { font-size: 20px !important; }
  .tab { padding: 7px 10px; font-size: 11px; }
  #top-bar .btn { display: none; }         /* 헤더 버튼 숨김 */
  #top-btn { display: flex !important; }   /* 발주등록 버튼만 표시 */
  .d-pipe-grid { grid-template-columns: repeat(3, 1fr) !important; }
}
@media print{header,#top-bar,.btn{display:none!important;}.ws-out{border:none!important;max-width:100%!important;}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* ══ 생산현황판 CSS ══ */
#panel-dashboard {
  background: #0a0c10;
  min-height: calc(100vh - 120px);
  margin: -1rem -1rem;
  padding: 20px 28px;
  position: relative;
}
#panel-dashboard::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(79,255,176,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,255,176,0.012) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}
.d-kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 18px; position: relative; }
.d-kpi {
  background: #111318;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  animation: dFadeUp 0.4s ease both;
}
.d-kpi::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--dk, #4fffb0); opacity: 0.7; }
.d-kpi-lbl { font-size: 10px; letter-spacing: 0.12em; color: #4a5568; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
.d-kpi-val { font-size: 30px; font-weight: 700; color: #fff; line-height: 1; margin-bottom: 4px; font-family: 'DM Mono', 'Courier New', monospace; }
.d-kpi-val span { font-size: 13px; color: #4a5568; margin-left: 2px; font-weight: 400; }
.d-kpi-sub { font-size: 11px; color: #4a5568; }
.d-kpi-ico { position: absolute; right: 14px; top: 12px; font-size: 20px; opacity: 0.12; }
.d-mid-row { display: grid; grid-template-columns: 1fr 360px; gap: 16px; margin-bottom: 18px; position: relative; }
.d-bot-row { display: grid; grid-template-columns: 1fr 320px; gap: 16px; position: relative; }
.d-card {
  background: #111318;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  padding: 18px 22px;
  animation: dFadeUp 0.5s ease both;
}
.d-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.d-card-title { font-size: 10px; letter-spacing: 0.12em; color: #4a5568; text-transform: uppercase; font-weight: 600; }
.d-pipe-grid { display: grid; grid-template-columns: repeat(10,1fr); gap: 8px; }
.d-pipe-col { display: flex; flex-direction: column; gap: 6px; }
.d-pipe-head { padding: 5px 3px; border-radius: 5px; text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.d-pipe-cnt { text-align: center; font-size: 26px; font-weight: 700; color: #fff; font-family: 'DM Mono','Courier New',monospace; padding: 6px 0 2px; }
.d-pipe-bar-wrap { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.d-pipe-bar { height: 100%; border-radius: 2px; transition: width 0.8s ease; opacity: 0.8; }
.d-pipe-items { display: flex; flex-direction: column; gap: 3px; max-height: 120px; overflow-y: auto; }
.d-pipe-item { padding: 3px 5px; background: #181c22; border-radius: 3px; font-size: 9px; color: #8892a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-left: 2px solid; cursor: pointer; }
.d-pipe-item:hover { color: #fff; }
.d-vendor-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.d-vendor-row { display: flex; align-items: center; gap: 10px; padding: 7px 9px; background: #181c22; border-radius: 6px; }
.d-vendor-nm { flex: 1; font-size: 12px; font-weight: 500; color: #e8eaf0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.d-vendor-proc { font-size: 9px; padding: 2px 6px; border-radius: 8px; font-weight: 700; white-space: nowrap; }
.d-vendor-cnt { font-family: 'DM Mono','Courier New',monospace; font-size: 12px; color: #8892a4; }
.d-order-tbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.d-order-tbl th { text-align: left; font-size: 9px; letter-spacing: 0.1em; color: #4a5568; text-transform: uppercase; padding: 0 8px 8px; border-bottom: 1px solid rgba(255,255,255,0.07); font-weight: 600; }
.d-order-tbl td { padding: 7px 8px; color: #8892a4; border-bottom: 1px solid rgba(255,255,255,0.05); }
.d-order-tbl tr:hover td { background: #181c22; }
.d-order-tbl tr:last-child td { border-bottom: none; }
.d-order-tbl td.dn { color: #e8eaf0; font-weight: 500; }
.d-ftabs { display: flex; gap: 4px; margin-bottom: 12px; }
.d-ftab { padding: 3px 10px; font-size: 10px; border: 1px solid rgba(255,255,255,0.07); border-radius: 4px; color: #4a5568; cursor: pointer; background: transparent; font-family: inherit; transition: all 0.15s; letter-spacing: 0.03em; }
.d-ftab.active, .d-ftab:hover { border-color: #4fffb0; color: #4fffb0; background: rgba(79,255,176,0.06); }
.d-proc-flow { display: flex; gap: 2px; flex-wrap: wrap; }
.d-chip { font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 700; opacity: 0.8; }
.d-chip.done { opacity: 0.25; }
.d-chip.cur { opacity: 1; }
.d-pbar-wrap { display: flex; align-items: center; gap: 5px; }
.d-pbar { flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; min-width: 40px; }
.d-pbar-fill { height: 100%; background: #00d4ff; border-radius: 2px; }
.d-pbar-pct { font-size: 9px; color: #4a5568; font-family: 'DM Mono','Courier New',monospace; white-space: nowrap; }
.d-sbadge { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 9px; font-weight: 700; }
.d-sw { background: rgba(74,85,104,0.4); color: #a0aec0; }
.d-si { background: rgba(55,138,221,0.2); color: #64b5f6; }
.d-sr { background: rgba(239,159,39,0.2); color: #ffb74d; }
.d-sd { background: rgba(79,255,176,0.15); color: #4fffb0; }
.d-dd-near { color: #e65100 !important; font-weight:600; }
.d-dd-over { color: #ff5f7e !important; }
.d-ship-sec { margin-bottom: 16px; }
.d-ship-sec:last-child { margin-bottom: 0; }
.d-ship-day { font-size: 9px; letter-spacing: 0.1em; color: #4a5568; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.d-ship-dot { width: 4px; height: 4px; border-radius: 50%; background: #4fffb0; box-shadow: 0 0 5px #4fffb0; }
.d-ship-item { display: flex; align-items: center; gap: 8px; padding: 7px 9px; background: #181c22; border-radius: 6px; margin-bottom: 4px; }
.d-ship-nm { flex: 1; font-size: 11px; font-weight: 500; color: #e8eaf0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.d-ship-cl { font-size: 9px; color: #4a5568; }
.d-ship-qty { font-family: 'DM Mono','Courier New',monospace; font-size: 10px; color: #8892a4; }
.d-ship-btn { padding: 2px 7px; background: transparent; border: 1px solid rgba(79,255,176,0.3); border-radius: 3px; color: #4fffb0; font-size: 9px; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; }

async function api(table,method,data,qs){
  // GET 요청 시 limit 파라미터로 최대 10000개
  let fullQs=qs||'';
  if(!method||method==='GET'){
    if(fullQs.indexOf('limit=')<0)fullQs=fullQs+(fullQs?'&':'')+'limit=10000';
  }
  let url=`${SUPA_URL}/rest/v1/${table}${fullQs?'?'+fullQs:''}`;
  const h={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
  const r=await fetch(url,{method:method||'GET',headers:h,body:data?JSON.stringify(data):undefined});
  if(!r.ok){console.error(await r.text());return null;}
  const t=await r.text();return t?JSON.parse(t):null;
}

function getMonthCount(arr){
  const seen=new Set();
  return arr.filter(o=>{
    if(!o.project_id)return true;
    if(seen.has(o.project_id))return false;
    seen.add(o.project_id);return true;
  }).length;
}

async function syncAll(){
  document.getElementById('sync-status').textContent='동기화 중...';
  try{
    const [cl,od,jd,vd,ct]=await Promise.all([
      api('clients','GET',null,'order=name.asc'),
      api('orders','GET',null,'order=created_at.desc&select=*,processes(*)'),
      api('jiryu_db','GET',null,'order=name.asc'),
      api('vendor_db','GET',null,'order=name.asc'),
      api('carton_types','GET',null,'order=name.asc'),
    ]);
    if(cl)DB.clients=cl;
    if(jd)DB.jiryuDB=jd.map(j=>({...j,w:j.weights||[]}));
    if(vd){DB.vendorDB={};vd.forEach(v=>{if(!DB.vendorDB[v.process_type])DB.vendorDB[v.process_type]=[];if(!DB.vendorDB[v.process_type].includes(v.name))DB.vendorDB[v.process_type].push(v.name);});}
    // clients(vendor)도 vendorDB에 보완 - 공정별 자동 dropdown
    if(cl){cl.filter(c=>c.client_type==='vendor'&&c.process_types).forEach(c=>{
      const pts=(c.process_types||'').split(',').map(s=>s.trim()).filter(Boolean);
      pts.forEach(pt=>{if(!DB.vendorDB[pt])DB.vendorDB[pt]=[];if(!DB.vendorDB[pt].includes(c.name))DB.vendorDB[pt].push(c.name);});
    });}
    if(ct)DB.cartonTypes=ct;
    if(od){
      DB.orders=od.map(o=>mapOrder(o));
      // 신규 발주가 있을 수 있으므로 연도 탭 리셋
      if(DB.orders.length>0){
        const latestY=DB.orders[0].ordered?DB.orders[0].ordered.slice(0,4):null;
        if(latestY&&listSelYear!==latestY)listSelYear=latestY;

      }

}

    calSpecs:(()=>{try{return o.cal_specs?JSON.parse(o.cal_specs):null;}catch(e){return null;}})() || [{w:o.cal_w||'',h:o.cal_h||'',jo:o.jo||'1',memo:''}],
    jiryuQty:o.jiryu_qty,jiryuAuto:o.jiryu_auto,jiryuSpec:o.jiryu_spec,
    deliveryDate:o.delivery_date,deliveryAddr:o.delivery_addr,
    jq:o.jiryu_qty,ja:o.jiryu_auto,js:o.jiryu_spec,
    dd:o.deadline||o.delivery_date,da:o.delivery_addr,pk:o.packing||'박스포장',
    deliveryType:o.delivery_type||'미정',deliveryNote:o.delivery_note||'',

    addons:o.addons||[],
    quote:(()=>{try{return o.quote_data?JSON.parse(o.quote_data):null;}catch(e){return null;}})(),
    procs:(o.processes||[]).sort((a,b)=>a.sort_order-b.sort_order).map(p=>({
      ...p,jt:p.jiryu_type,routeAuto:p.route_auto,

function getEO(){return window._editOrder||{};}


function showClientOpts(){const el=document.getElementById('eq-cl-opts');if(el)el.style.display='block';}
function hideClientOpts(){setTimeout(function(){const el=document.getElementById('eq-cl-opts');if(el)el.style.display='none';},200);}
function filterClientOpts(q){
  const opts=document.getElementById('eq-cl-opts');if(!opts)return;
  opts.style.display='block';
  const qL=q.toLowerCase();
  opts.querySelectorAll('div[onclick^="selectClient"]').forEach(function(d){
    d.style.display=d.textContent.toLowerCase().includes(qL)?'block':'none';
  });
}
function selectClient(id,name,addr){
  document.getElementById('eq-cl').value=id;
  const inp=document.getElementById('eq-cl-search');if(inp)inp.value=name;
  getEO().client_id=id;getEO().clientName=name;
  hideClientOpts();
  // 납품처 자동 채우기
  const daEl=document.getElementById('eq-da');
  if(daEl&&!daEl.value&&addr){daEl.value=addr;}
}
document.addEventListener('click',function(e){if(!e.target.closest('[id^="eq-cl"]')&&!e.target.closest('#eq-cl-opts')){hideClientOpts();}});

function onClientChange(val){
  if(val==='__new__'){openClientModal(null,true);return;}
  const c=DB.clients.find(x=>x.id===val);
  if(c){
    getEO().client_id=c.id;getEO().clientName=c.name;
    // 납품처 자동 채우기 (비어있을 때만)
    const daEl=document.getElementById('eq-da');
    if(daEl&&!daEl.value&&c.addr){daEl.value=c.addr;}
  }
}
function togProjectWrap(checked){const el=document.getElementById('project-wrap');if(el)el.style.display=checked?'block':'none';}
function selComp(el,cid){document.querySelectorAll('[onclick^="selComp"]').forEach(e=>{e.style.borderColor='#e8e8e4';e.style.background='#fff';});el.style.borderColor='#1a1a1a';el.style.background='#f5f5f3';getEO().company=cid;const c=COS.find(x=>x.id===cid)||COS[0];const m=MGS.find(x=>x.id===(getEO().manager||'m1'))||MGS[0];document.getElementById('comp-info').innerHTML=`<div style="font-weight:600;">${c.name} <span style="font-weight:400;color:#888;">${c.biz}</span></div><div style="color:#888;">${c.addr}</div><div style="color:#888;">TEL ${c.tel} / FAX ${c.fax}</div><div style="margin-top:4px;padding-top:4px;border-top:1px solid #e8e8e4;">담당: ${m.name} ${m.title} ${m.tel}</div>`;}
function selMgr(el,mid){
  document.querySelectorAll('[onclick^="selMgr"]').forEach(e=>{e.style.borderColor='#e8e8e4';e.style.background='#fff';});
  el.style.borderColor='#1a1a1a';el.style.background='#f5f5f3';
  getEO().manager=mid;
  const c=COS.find(x=>x.id===(getEO().company||'c1'))||COS[0];
  const m=MGS.find(x=>x.id===mid)||MGS[0];
  const ci=document.getElementById('comp-info');
  if(ci)ci.innerHTML=`<div style="font-weight:600;">${c.name} <span style="font-weight:400;color:#888;">${c.biz}</span></div><div style="color:#888;">${c.addr}</div><div style="color:#888;">TEL ${c.tel} / FAX ${c.fax}</div><div style="margin-top:4px;padding-top:4px;border-top:1px solid #e8e8e4;">담당: ${m.name} ${m.title} ${m.tel}</div>`;

// 신규 발주 저장 시 목형 자동 생성
async function autoCreateMolds(savedOid, eo, specs, clName, prodName){
  clName=clName||(DB.clients.find(x=>x.id===(document.getElementById('eq-cl')?.value))?.name||eo.clientName||'');
  prodName=prodName||(document.getElementById('eq-pn')?.value||eo.productName||'');
  specs=specs||getCalSpecs();
  if(!clName||!prodName||!specs.length)return;

  const hasSsabari=(eo.procs||[]).some(p=>p.type==='ssabari');
  const co=eo.company||'c1';
  const compName=COS.find(c=>c.id===co)?.name||'';
  const today=new Date().toISOString().split('T')[0];
  const tproc=(eo.procs||[]).filter(p=>p.type==='thomson');
  const thomsonVendor=tproc.length>0?tproc[0].vendor:'창고';
  const linkedMolds=window._linkedMolds||{};

  for(let si=0;si<specs.length;si++){
    const sp=specs[si];
    // 수동 연결된 목형 → 위치 이동만
    if(linkedMolds[si]){
      const lm=linkedMolds[si];
      if(lm.current_location!==thomsonVendor){
        await api('mold_movements','POST',{mold_id:lm.id,location:thomsonVendor,moved_date:today,reason:'발주연동',order_id:savedOid});
        await api('molds','PATCH',{current_location:thomsonVendor},'id=eq.'+lm.id);
        toast('🗂 목형 #'+lm.id+' → '+thomsonVendor+' 이동');
      }
      continue;
    }
    // 칼규격이 없으면 스킵
    if(!sp.w||!sp.h)continue;

    const moldCount=hasSsabari?2:1;
    for(let mi=0;mi<moldCount;mi++){
      const moldSuffix=moldCount>1?(mi===0?' (표지)':' (이면)'):'';
      // 품명: 제품명 + 칼규격 제목(있으면)
      const moldTitle=sp.title?prodName+' '+sp.title:prodName;
      const sizeStr=sp.w+'*'+sp.h+(sp.jo&&sp.jo!=='1'?'['+sp.jo+'조]':'');
      const moldData={
        company:compName,
        client:clName,
        product:moldTitle+moldSuffix+(sp.memo?' ['+sp.memo+']':''),
        size:sizeStr,
        dimensions:'',code:'',note:sp.memo||'',
        current_location:thomsonVendor
      };
      const mr=await api('molds','POST',moldData);
      const mrObj=Array.isArray(mr)?mr[0]:mr;
      if(mrObj&&mrObj.id){
        await api('mold_movements','POST',{mold_id:mrObj.id,location:thomsonVendor,moved_date:today,reason:'발주연동',order_id:savedOid});
        if(!molds.find(m=>m.id===mrObj.id))molds.push({...mrObj,history:[]});
        toast('🗂 목형 신규생성: '+moldData.product+' ('+sizeStr+') → '+thomsonVendor);
      }
    }
  }
  window._linkedMolds={};
}

      note:p.note||'',route:p.route||'',route_auto:p.routeAuto!==false,

      jiryu_type:p.jt||null,weight:p.weight||null,
      w:p.w||null,h:p.h||null,grain:p.grain||'장결',
      jiryu_qty:p.qty||null,sort_order:i,
    });
  }
}

  const jqVal=parseInt(document.getElementById('eq-jq')?.value)||0;

    company:o.company||'c1',
    manager:o.manager||'m1',
    name:document.getElementById('eq-pn')?.value||o.productName||o.name||'',
    product_name:document.getElementById('eq-pn')?.value||o.productName||'',
    size:document.getElementById('eq-sz')?.value||'',
    qty:parseInt(document.getElementById('eq-qty')?.value)||0,
    cal_w:(getCalSpecs().length>0?getCalSpecs()[0].w:'')||document.getElementById('eq-cw')?.value||'',
    cal_specs:JSON.stringify(getCalSpecs()),
    cal_h:(getCalSpecs()[0]?.h)||document.getElementById('eq-ch')?.value||'',
    jo:(document.getElementById('eq-jo')?.value||'1조').replace('조',''),
    addons:o.addons||[],
    jiryu_qty:jqVal,
    jiryu_auto:o.ja!==false,
    jiryu_spec:document.getElementById('eq-js')?.value||'',
    ordered:document.getElementById('eq-ordered')?.value||null,
    deadline:document.getElementById('eq-dd')?.value||null,
    delivery_addr:document.getElementById('eq-da')?.value||'',
    packing:document.getElementById('eq-pk')?.value||'박스포장',
    status:oid?(o.status||'대기'):'대기',
    memo:document.getElementById('eq-memo')?.value||'',
    is_urgent:document.getElementById('eq-urgent')?.checked||false,
    shipped_date:document.getElementById('eq-shipped')?.value||null,
    carton_type_id:document.getElementById('eq-carton')?.value||null,
    carton_qty:parseInt(document.getElementById('eq-carton-qty')?.value)||0,
    project_id:projId,
    delivery_type:document.getElementById('eq-delivery-type')?.value||'미정',
    delivery_note:document.getElementById('eq-delivery-note')?.value||'',
    src_order_id:o.src_order_id||o._srcId||null,
    is_reorder:o.is_reorder||false,
  };

  let savedOid=oid;

  // ── 저장 분기 ──
  const cleanOid=oid&&oid.length>0?oid:null;
  // 폼 데이터를 브랜치 분기 전에 미리 수집 (closeMod/return 이전)
  const _specsNow=getCalSpecs();
  const _clEl=document.getElementById('eq-cl');
  const _clNow=DB.clients.find(x=>x.id===(_clEl?.value))||null;
  const _clNameNow=_clNow?.name||document.getElementById('eq-cl-search')?.value||'';
  const _prodNameNow=document.getElementById('eq-pn')?.value||''; // ''를 null로 정규화
  if(cleanOid){
    // 기존 발주 편집: 재발주건이고 공정이 바뀐 경우 → 질문
    if(o.is_reorder&&o._srcId&&reorderHasChanged(o)){
      const choice=await showReorderChoiceModal(cleanOid);
      if(choice==='new'){
        const r=await api('orders','POST',Object.assign({},data,{status:'대기'}));
        const rObj3=Array.isArray(r)?r[0]:r;
        if(!rObj3||!rObj3.id){toast('저장 실패');return;}
        await _saveProcs(rObj3.id,o.procs||[],true);
        await autoCreateMolds(rObj3.id, o, _specsNow, _clNameNow, _prodNameNow);
        toast('✅ 신규 발주로 등록됐어요!');
        closeMod();await syncAll();
      } else if(choice==='overwrite'){
        await api('orders','PATCH',data,'id=eq.'+cleanOid);
        await _saveProcs(cleanOid,o.procs||[],true);
        await autoCreateMolds(cleanOid, o, _specsNow, _clNameNow, _prodNameNow);
        toast('✅ 발주서가 수정됐어요.');
        closeMod();await syncAll();
      } else if(choice==='once'){

        const onceData=Object.assign({},data,{status:'대기',is_reorder:true});
        delete onceData.id;
        const r=await api('orders','POST',onceData);
        const rObj=Array.isArray(r)?r[0]:r;
        if(!rObj||!rObj.id){toast('저장 실패');return;}
        await _saveProcs(rObj.id,o.procs||[],true);
        await autoCreateMolds(rObj.id, o, _specsNow, _clNameNow, _prodNameNow);
        toast('✅ 이번 재발주가 등록됐어요.');
        closeMod();await syncAll();
      } else {
        toast('취소됐어요.');
      }
      return;
    }
    // 일반 편집
    await api('orders','PATCH',data,'id=eq.'+cleanOid);
    savedOid=cleanOid;
  } else if(!cleanOid&&o.is_reorder&&o._srcId){
    if(reorderHasChanged(o)){
      // 공정이 바뀐 경우 → 질문창
      const choice=await showReorderChoiceModal(o._srcId);
      if(choice==='new'){
        const r=await api('orders','POST',Object.assign({},data,{status:'대기'}));
        const rObj3=Array.isArray(r)?r[0]:r;
        if(!rObj3||!rObj3.id){toast('저장 실패');return;}
        await _saveProcs(rObj3.id,o.procs||[],true);
        await autoCreateMolds(rObj3.id, o, _specsNow, _clNameNow, _prodNameNow);
        toast('✅ 신규 발주로 등록됐어요!');
        closeMod();await syncAll();
      } else if(choice==='overwrite'){
        await api('orders','PATCH',data,'id=eq.'+o._srcId);
        await _saveProcs(o._srcId,o.procs||[],true);
        toast('✅ 원본 발주서에 덮어썼어요.');
        closeMod();await syncAll();
      } else if(choice==='once'){
        const onceData3=Object.assign({},data,{status:'대기',is_reorder:true});
        delete onceData3.id;
        const r=await api('orders','POST',onceData3);
        const rObj2=Array.isArray(r)?r[0]:r;
        if(!rObj2||!rObj2.id){toast('저장 실패');return;}
        await _saveProcs(rObj2.id,o.procs||[],true);
        await autoCreateMolds(rObj2.id, o, _specsNow, _clNameNow, _prodNameNow);
        toast('✅ 이번 재발주가 등록됐어요.');
        closeMod();await syncAll();
      } else {
        toast('취소됐어요.');
      }
    } else {
      // 날짜만 바뀐 경우 → 새 발주서로 저장 (새 ID)
      const r=await api('orders','POST',Object.assign({},data,{status:'대기'}));
      if(!r||!r[0]){toast('저장 실패');return;}
      await _saveProcs(r[0].id,o.procs||[],true);
      toast('✅ 재발주 등록됐어요!');
      closeMod();await syncAll();
    }
    return;
  } else {
    // 신규 저장 (일반 신규)
    const r=await api('orders','POST',data);
    if(!r||!r[0]){toast('저장 실패');return;}
    savedOid=r[0].id;
  }

  // 공정 저장
  await api('processes','DELETE',null,`order_id=eq.${savedOid}`);
  const procs=o.procs||[];
  for(let i=0;i<procs.length;i++){
    const p=procs[i];
    await api('processes','POST',{
      order_id:savedOid,type:p.type,vendor:p.vendor||'',
      vendor_direct:p.vendorDirect||false,sub_type:p.subType||'',
      note:p.note||'',route:p.route||'',route_auto:p.routeAuto!==false,
      done_date:p.doneDate||null,is_done:p.is_done||false,
      jiryu_type:p.jt||null,weight:p.weight||null,
      w:p.w||null,h:p.h||null,grain:p.grain||'장결',
      jiryu_qty:p.qty||null,sort_order:i,
    });

  // 발주 저장 시 목형 자동 생성 및 연동
  // 신규 발주 시 목형 자동 생성
  const _eo=getEO();

    const _tproc2=(_eo.procs||[]).filter(p=>p.type==='thomson');
    const _thomsonV=_tproc2.length>0?_tproc2[0].vendor:'창고';
    const lm2=window._linkedMolds||{};
    for(const si in lm2){

      if(lm&&lm.current_location!==_thomsonV){

  // 파일 업로드

    for(const f of window._pendingFiles){

  }
  toast('저장 완료 ✓');
  closeMod();
  await syncAll();
}

function getOrderStatus(o){
  // 상태 계산: 공정 기반으로 실시간 반영
  if(o.status==='출고완료')return '출고완료';
  const procs=o.procs||[];
  if(!procs.length)return o.status||'대기';
  const allDone=procs.every(p=>p.is_done);
  if(allDone)return o.status||'생산완료대기';
  // 출고(delivery) 직전 공정까지 완료됐으면 생산완료대기
  const delivIdx=procs.map(p=>p.type).lastIndexOf('delivery');
  if(delivIdx>0){
    const beforeDeliv=procs.slice(0,delivIdx);
    if(beforeDeliv.length&&beforeDeliv.every(p=>p.is_done))return '생산완료대기';
  }
  const anyDone=procs.some(p=>p.is_done);
  if(anyDone)return '진행중';
  return o.status||'대기';
}

function listRenderRows(){
  const byYear={};
  DB.orders.forEach(o=>{
    const y=o.ordered?o.ordered.slice(0,4):'미분류';
    const m=o.ordered?parseInt(o.ordered.slice(5,7)):0;
    if(!byYear[y])byYear[y]={};
    if(!byYear[y][m])byYear[y][m]=[];
    byYear[y][m].push(o);
  });
  // getMonthCount is defined globally below
  const years=Object.keys(byYear).sort().reverse();

  years.forEach(y=>{
    const el=document.getElementById('list-rows-'+y);
    if(!el)return;

    // 필터링
    let orders=[];
    if(listSelYear===y&&listSelMonth){
      orders=byYear[y][listSelMonth]||[];
    } else if(listSelYear===y||!listSelYear){
      Object.values(byYear[y]).forEach(arr=>orders.push(...arr));
    } else {
      Object.values(byYear[y]).forEach(arr=>orders.push(...arr));
    }

    const statusF=listStatusFilter||'';
    const q=listSearchQ.toLowerCase().trim();

    orders=orders.filter(o=>{
      if(q&&![o.productName,o.name,o.clientName,o.size].join(' ').toLowerCase().includes(q))return false;
      if(statusF){const s=getOrderStatus(o);if(s!==statusF)return false;}
      return true;
    });
    // 프로젝트 묶음: 대표 1건 + _sub에 나머지
    const _seenG=new Set();
    orders=orders.reduce(function(acc,o){
      if(!o.project_id){acc.push({...o,_sub:[]});return acc;}
      if(_seenG.has(o.project_id))return acc;
      _seenG.add(o.project_id);
      // _sub는 DB.orders 전체에서 찾아야 함 (byYear엔 대표 1건만 있으므로)
      const subs=DB.orders.filter(x=>x.project_id===o.project_id&&x.id!==o.id);
      acc.push({...o,_sub:subs});
      return acc;
    },[]);

    // 정렬
    if(listSort==='name'){
      orders.sort((a,b)=>(a.productName||a.name||'').localeCompare(b.productName||b.name||'','ko'));
    } else if(listSort==='deadline'){
      orders.sort((a,b)=>{
        const da=a.dd||a.deadline||'9999-99-99';
        const db=b.dd||b.deadline||'9999-99-99';
        return da.localeCompare(db);
      });
    } else {
      orders.sort((a,b)=>(b.ordered||'').localeCompare(a.ordered||''));
    }

    if(!orders.length){el.innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">해당 조건의 발주서가 없어요</div>';return;}

    // 월별 그룹 (날짜순일 때)
    if(listSort==='date'&&!(listSelYear===y&&listSelMonth)){
      const byM={};
      orders.forEach(o=>{const m=o.ordered?parseInt(o.ordered.slice(5,7)):0;if(!byM[m])byM[m]=[];byM[m].push(o);});
      // 월별 그룹 (문자열 연결 방식)
      let mHtml='';
      Object.keys(byM).sort((a,b)=>b-a).forEach(m=>{
        mHtml+='<div class="order-group" style="margin-bottom:8px;">';
        mHtml+='<div class="order-group-header" onclick="togOrderGroup(this)">';
        mHtml+='<span style="font-size:13px;font-weight:600;">'+m+'월</span>';
        mHtml+='<span class="badge badge-gray">'+byM[m].length+'건</span>';
        mHtml+='<span style="font-size:12px;color:#888;margin-left:auto;">발주서 '+byM[m].length+'건</span>';
        mHtml+='</div>';
        mHtml+='<div>'+byM[m].map(o=>listRowHtml(o)).join('')+'</div>';
        mHtml+='</div>';
      });
      el.innerHTML=mHtml;
    } else {
      el.innerHTML='<div class="order-group">'+orders.map(o=>listRowHtml(o)).join('')+'</div>';
    }
  });
}

function listRowHtml(o){
  if(o._sub&&o._sub.length>0) return listSetHtml(o);
  return listSingleRowHtml(o);
}

function listSetHtml(o){
  const allMembers=[o,...(o._sub||[])];
  const cnt=allMembers.length;
  const totalQty=allMembers.reduce(function(s,m){return s+(parseInt(m.qty)||0);},0);
  let html='<div style="margin-bottom:10px;border:1.5px solid #7c3aed;border-radius:10px;overflow:hidden;">';
  // 그룹 헤더
  html+='<div style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:linear-gradient(90deg,#7c3aed18,#7c3aed08);border-bottom:1px solid #ede9fe;">';
  html+='<span style="font-size:12px;padding:1px 7px;border-radius:10px;background:#7c3aed;color:#fff;font-weight:700;">SET</span>';
  html+='<span style="font-size:14px;font-weight:700;color:#5b21b6;">'+(o.project_name||'그룹명')+'</span>';
  html+='<span style="font-size:11px;color:#9f7ae8;">'+cnt+'건</span>';
  html+='<span style="font-size:11px;color:#9f7ae8;margin-left:2px;">· 합계 '+totalQty.toLocaleString()+'ea</span>';
  html+='<button data-pid="'+o.project_id+'" onclick="ungroupByEl(this)" style="margin-left:auto;padding:2px 10px;font-size:11px;border:1px solid #c4b5fd;border-radius:4px;color:#7c3aed;background:#fff;cursor:pointer;">묶기 해제</button>';
  html+='</div>';
  // 멤버 행들
  allMembers.forEach(function(m,idx){
    html+='<div style="'+(idx<cnt-1?'border-bottom:1px solid #f0ecff;':'')+'">';
    html+=listSingleRowHtml(m,true);
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function listSingleRowHtml(o,isGroupMember){
  const status=getOrderStatus(o);
  const ss={'대기':'background:#f1f1ee;color:#666;','진행중':'background:#e8f0fe;color:#1a56c4;','생산완료대기':'background:#fff3e0;color:#e65100;','출고완료':'background:#e6f4ea;color:#1e7e34;'}[status]||'background:#f1f1ee;color:#666;';
  const procs=o.procs||[];
  const activePs=getActiveProcs(procs);
  // 병렬 공정 그룹핑: 연속된 활성 공정은 || 로 묶어서 표시
  let rhParts=[];
  let i=0;
  while(i<procs.length){
    const p=procs[i];
    const c=PM[p.type]?.color||'#888';
    const isActive=!p.is_done&&activePs.includes(p);
    const isDone=p.is_done;
    // 현재 공정과 같은 타입의 활성 공정이 연속으로 있으면 병렬 그룹
    let groupSpans='';
    if(isActive){
      // 같이 활성인 공정들을 모아서 | 로 표시
      const parallelGroup=activePs.filter(ap=>!ap.is_done);
      if(parallelGroup.length>1&&parallelGroup.indexOf(p)===0){
        // 첫 번째 활성 공정일 때만 그룹 전체 출력
        groupSpans=parallelGroup.map(ap=>{
          const ac=PM[ap.type]?.color||'#888';
          return '<span style="font-size:10px;padding:1px 6px;border-radius:8px;white-space:nowrap;background:'+ac+'22;color:'+ac+';font-weight:600;border:1px solid '+ac+';">'+(PM[ap.type]?.name||'')+(ap.vendor?' '+ap.vendor:'')+'</span>';
        }).join('<span style="color:#aaa;font-size:9px;"> ∥ </span>');
        // 이미 출력한 병렬 공정들은 건너뜀
        i+=parallelGroup.length;
        rhParts.push(groupSpans);
        if(i<procs.length)rhParts.push('<span style="color:#ddd;font-size:9px;"> → </span>');
        continue;
      }
    }
    const s=isDone?'background:#e6f4ea;color:#1e7e34;':isActive?`background:${c}22;color:${c};font-weight:600;border:1px solid ${c};`:'background:#f1f1ee;color:#bbb;';
    rhParts.push('<span style="font-size:10px;padding:1px 6px;border-radius:8px;white-space:nowrap;'+s+'">'+(PM[p.type]?.name||'')+'</span>');
    if(i<procs.length-1)rhParts.push('<span style="color:#ddd;font-size:9px;"> → </span>');
    i++;
  }
  const rh=rhParts.join('');
  const mgr=MGS.find(m=>m.id===o.manager);
  const mg=mgr?`<div style="font-size:11px;font-weight:600;color:#1a56c4;">${mgr.name}</div><div style="font-size:10px;color:#aaa;">${mgr.title}</div>`:'<div style="font-size:11px;color:#ccc;">-</div>';
  const rs='grid-template-columns:2.5fr 1.5fr 0.8fr 0.7fr 0.8fr auto auto;cursor:pointer;'+(isGroupMember?'background:#fff;border-left:3px solid #7c3aed;padding-left:12px;':'background:#fafaf8;');
  return `<div class="order-row" style="${rs}" onclick="openOrderDetail('${o.id}')">
    <div>
      <div style="font-size:13px;font-weight:500;">${o.productName||o.name}${o.is_reorder?' <span class="badge badge-amber" style="font-size:10px;">재발주</span>':''}${o.is_urgent?' <span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#fde8e8;color:#c0392b;font-weight:700;">🚨초지급</span>':''}</div>
      <div style="font-size:11px;color:#888;margin-top:2px;">${o.clientName||'-'} · ${o.ordered||''}</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:2px;">${rh||'<span style="color:#ccc;font-size:12px;">공정 없음</span>'}</div>
    <div>${mg}</div>
    <div style="font-size:12px;">${(()=>{
      if(!o.dd)return '<span style="color:#ccc;">-</span>';
      const d=new Date(o.dd),now=new Date();
      const diff=(d-now)/(1000*60*60*24);
      const c=diff<=-2?'#c0392b':diff<=0?'#e65100':'#555';
      return '<span style="color:'+c+';">'+o.dd+'</span>';
    })()}</div>
    <div style="font-size:13px;font-weight:500;">${(o.qty||0).toLocaleString()}<span style="font-size:11px;color:#aaa;">ea</span></div>
    <div><span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;${ss}">${status}</span></div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;" onclick="event.stopPropagation()">
      ${status==='생산완료대기'?`<button class="btn btn-sm btn-success" onclick="event.stopPropagation();markShipped('${o.id}')">출고완료</button>`:''}
      <button class="btn btn-sm" onclick="openOrderEdit('${o.id}')">편집</button>
      <button class="btn btn-sm" onclick="openPrint('${o.id}')">출력</button>
      <button class="btn btn-sm btn-danger" onclick="deleteOrder('${o.id}')">삭제</button>
    </div>
  </div>`;
}

// 병렬 워크플로우 지원: 현재 활성 공정 목록 반환
function routeTargetsProc(routeStr, p){
  // route 문자열이 공정 p를 가리키는지 확인
  if(!routeStr)return false;
  const rt=routeStr.replace('→','').trim().toLowerCase();
  if(!rt)return false;
  const vendor=(p.vendor||'').trim().toLowerCase();
  const typeName=(PM[p.type]?PM[p.type].name:p.type).toLowerCase();
  return (vendor&&rt===vendor)||(typeName&&rt===typeName)||
         (vendor&&rt.indexOf(vendor)>=0)||(typeName&&rt.indexOf(typeName)>=0);
}

function getActiveProcs(procs){
  if(!procs||!procs.length)return[];
  const active=[];
  procs.forEach(function(p,i){
    if(p.is_done)return;
    // 나보다 앞에 있는 미완료 공정 중 "나를 route 대상으로 가리키는" 것이 있으면 블록
    const blockedBy=procs.slice(0,i).some(function(prev){
      if(prev.is_done)return false;
      return routeTargetsProc(prev.route, p);
    });
    if(!blockedBy)active.push(p);
  });
  // fallback: 아무것도 활성 없으면 첫 미완료
  if(!active.length){
    const first=procs.find(function(p){return !p.is_done;});
    if(first)active.push(first);
  }
  return active;
}

function getCurProc(procs){
  const a=getActiveProcs(procs);
  return a.length?a[0]:null;
}

      if(!curProc.vendor)return;
      const v=curProc.vendor;
      if(!vendorMap[v])vendorMap[v]={name:v,items:[]};
      vendorMap[v].items.push({order:o,proc:curProc,allProcs:procs});
    });
  });

  // 공정 순서 고정 정렬 (지류→인쇄→코팅→금박→합지→톰슨→싸바리→접착→조립→카톤→표지→부자재→출고)
  const PROC_ORDER=['jiryu','print','coating','foil','hapji','thomson','ssabari','jeopchak','assembly','carton','pyoji','material','delivery'];
  const vendors=Object.values(vendorMap).sort(function(a,b){

    if(aIdx!==bIdx)return (aIdx<0?999:aIdx)-(bIdx<0?999:bIdx);
    return b.items.length-a.items.length; // 같은 공정이면 건수 많은 순
  });
  el.innerHTML=`
    <div style="margin-bottom:1rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div style="position:relative;flex:1;min-width:200px;">
        <input placeholder="업체명 검색..." oninput="filterVendor(this.value)" style="padding-left:30px;"/>
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#aaa;font-size:13px;">🔍</span>
      </div>
      <span style="font-size:12px;color:#888;">현재 공정 기준 · 완료 처리하면 다음 공정으로 이동</span>
    </div>
    <div id="vendor-body">
    ${!vendors.length?'<div class="loading">진행 중인 발주가 없어요</div>':vendors.map((v,vi)=>{
      const vid='vcard-'+vi;
      const vdid='vdetail-'+vi;
      return '<div class="vendor-card" id="'+vid+'">'
        +'<div class="vendor-header" data-vdid="'+vdid+'" onclick="togVendorById(this.dataset.vdid)">'
        +'<div style="font-size:13px;font-weight:600;">'+v.name+'</div>'
        +'<span class="badge badge-blue">'+v.items.length+'건 진행중</span>'
        +'<span style="font-size:12px;color:#aaa;margin-left:auto;">▶</span>'
        +'</div>'
        +'<div id="'+vdid+'" style="display:none;padding:0 14px 12px;">'
        +v.items.map(function({order:o,proc:p,allProcs}){
          const actives=getActiveProcs(allProcs);
          const flowHtml=allProcs.map(function(ap,i){
            const isActive=actives.indexOf(ap)>=0;
            const isDone=ap.is_done;
            const color=PM[ap.type]?.color||'#888';
            const style=isDone?'background:#e6f4ea;color:#1e7e34;text-decoration:line-through;':
              isActive?'background:'+color+'33;color:'+color+';font-weight:600;border:1px solid '+color+';':
              'background:#f1f1ee;color:#aaa;';
            return '<span style="font-size:11px;padding:2px 7px;border-radius:10px;'+style+'">'
              +(PM[ap.type]?.name||'')+' '+(ap.vendor?'('+ap.vendor+')':'')+'</span>'
              +(i<allProcs.length-1?'<span style="color:#ccc;font-size:10px;"> → </span>':'');
          }).join('');
          return '<div style="padding:10px 0;border-bottom:1px solid #f0f0ee;">'
            +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">'
            +'<div style="flex:1;cursor:pointer;" data-oid="'+o.id+'" onclick="openOrderDetail(this.dataset.oid)">'
            +'<div style="font-size:13px;font-weight:500;">'+(o.productName||o.name)+'</div>'
            +'<div style="font-size:11px;color:#888;">'+(o.clientName||'-')+' · 납기 '+(o.dd||'-')+' · '+(o.qty||0).toLocaleString()+'ea</div>'
            +'</div>'
            +'<button class="btn btn-sm btn-success" data-oid="'+o.id+'" data-pid="'+p.id+'" onclick="completeProcAndNext(this.dataset.oid,this.dataset.pid)">✓ 완료 → 다음</button>'
            +(allProcs.some(function(ap){return ap.is_done;})
              ?'<button class="btn btn-sm" data-oid="'+o.id+'" data-pid="'+p.id+'" onclick="rollbackProc(this.dataset.oid,this.dataset.pid)" style="color:#e65100;border-color:#e65100;">↩ 롤백</button>'
              :'')
            +'</div>'
            +'<div style="display:flex;flex-wrap:wrap;align-items:center;gap:3px;">'+flowHtml+'</div>'
            +'</div>';
        }).join('')
        +'</div>'
        +'</div>';
    }).join('')}
    </div>`;
}



async function rollbackProc(oid, pid){
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  const procs=o.procs||[];
  const curIdx=procs.findIndex(p=>p.id===pid);if(curIdx<0)return;

  // 이전에 완료된 공정 찾기 (현재 공정보다 앞에 있고 is_done=true인 것)
  const prevDone=procs.slice(0,curIdx).filter(p=>p.is_done);
  if(!prevDone.length){toast('롤백할 이전 공정이 없어요.');return;}

  const lastDone=prevDone[prevDone.length-1];
  if(!confirm('['+( PM[lastDone.type]?.name||lastDone.type)+(lastDone.vendor?' · '+lastDone.vendor:'')+'] 공정을 완료 취소하고 롤백할까요?'))return;

  // 이전 완료 공정 → is_done=false 로 롤백
  await api('processes','PATCH',{is_done:false},'id=eq.'+lastDone.id);
  lastDone.is_done=false;

  // 발주 상태도 업데이트
  const allDone=procs.every(p=>p.is_done);
  const anyDone=procs.some(p=>p.is_done);
  const newStatus=allDone?'생산완료대기':anyDone?'진행중':'대기';
  if(o.status==='생산완료대기'||o.status==='출고완료'){
    await api('orders','PATCH',{status:newStatus},'id=eq.'+oid);
    o.status=newStatus;
  }

  toast('↩ ['+(PM[lastDone.type]?.name||lastDone.type)+'] 공정 롤백됐어요.');
  rVendor();
  if(curTab==='list')rList();
}

function togVendorById(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function togVendor(id){const el=document.getElementById('vd-'+id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
function filterVendor(q){document.querySelectorAll('.vendor-card').forEach(c=>{c.style.display=q?c.textContent.includes(q)?'block':'none':'block';});}

async function completeProcAndNext(oid,pid){
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  const procs=o.procs||[];
  const idx=procs.findIndex(p=>p.id===pid);if(idx<0)return;
  await api('processes','PATCH',{is_done:true},`id=eq.${pid}`);
  procs[idx].is_done=true;

  // 완료 후 활성 공정 재계산
  const allDone=procs.every(p=>p.is_done);
  if(allDone){
    await api('orders','PATCH',{status:'생산완료대기'},`id=eq.${oid}`);
    o.status='생산완료대기';
    toast('🎉 모든 공정 완료! 생산완료대기로 변경됐어요.');
  } else {
    const nextActives=getActiveProcs(procs);
    const p=procs[idx];
    const rt=(p.route||'').replace(/^→\s*/,'').trim();
    // 내가 route한 대상이 아직 다른 공정을 기다리는지 확인 (원단 대기)
    const waitingFor=nextActives.filter(np=>{
      // 방금 완료한 공정과 같은 type의 미완료가 아직 있으면 원단 대기
      return np.type===p.type&&!np.is_done&&np.id!==pid;
    });
    if(waitingFor.length>0){
      toast('✓ 완료! 📦 원단 대기 중 — 나머지 지류 입고 후 다음 공정으로 이동해요.');
    } else if(nextActives.length>0){
      const names=nextActives.map(np=>(PM[np.type]?.name||np.type)+(np.vendor?' ('+np.vendor+')':'')).join(', ');
      toast('✓ 완료! 다음 활성 공정: '+names);
    } else {
      toast('✓ 완료 처리됐어요');
    }
  }
  rVendor();
  if(curTab==='list')rList();
}

async function toggleProcDone(oid,pid,done){
  await api('processes','PATCH',{is_done:done},`id=eq.${pid}`);
  const o=DB.orders.find(x=>x.id===oid);
  if(o){const p=o.procs.find(x=>x.id===pid);if(p)p.is_done=done;}
  toast(done?'완료 처리됐어요':'완료 취소됐어요');
  rVendor();
  if(curTab==='list')rList();
}

function fmtKo(d){return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${['일','월','화','수','목','금','토'][d.getDay()]})`;}

function getShipOrders(y,m){
  return DB.orders.filter(o=>{
    const d=o.shipped_date||o.dd||o.deadline;if(!d)return false;
    try{const dt=new Date(d);
      if(isNaN(dt))return false;
      if(y!==undefined&&dt.getFullYear()!==y)return false;
      if(m!==undefined&&dt.getMonth()!==m)return false;
      return true;
    }catch(e){return false;}
  });
}
function getOrdersForDate(dateStr){
  return DB.orders.filter(o=>(o.shipped_date||o.dd||o.deadline)===dateStr);
}
async function moveOrderDate(oid,newDate){
  await api('orders','PATCH',{shipped_date:newDate},`id=eq.${oid}`);
  const o=DB.orders.find(x=>x.id===oid);
  if(o){o.shipped_date=newDate;o.dd=newDate;}
  toast('출고 날짜 변경됐어요');
  rCalendar();
}

function rCalendar(){loadPlanNotes().then(()=>{
  if(calView==='month')rCalMonth();
  else if(calView==='week')rCalWeek();
  else rCalDay();
});}

function calSetView(v){calView=v;rCalendar();}
function calNavBar(){
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let titleHtml='';
  if(calView==='month'){
    titleHtml=`<button class="btn btn-sm" onclick="calYear--;rCalendar()">◀◀</button>
      <button class="btn btn-sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}rCalendar()">◀</button>
      <span style="font-size:15px;font-weight:600;min-width:130px;text-align:center;">${calYear}년 ${months[calMonth]}</span>
      <button class="btn btn-sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}rCalendar()">▶</button>
      <button class="btn btn-sm" onclick="calYear++;rCalendar()">▶▶</button>`;
  } else if(calView==='week'){
    // 현재 주 월요일 기준
    const mon=new Date(calDayDate);mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    titleHtml=`<button class="btn btn-sm" onclick="calDayDate.setDate(calDayDate.getDate()-7);rCalendar()">◀</button>
      <span style="font-size:15px;font-weight:600;min-width:200px;text-align:center;">${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()} 주간</span>
      <button class="btn btn-sm" onclick="calDayDate.setDate(calDayDate.getDate()+7);rCalendar()">▶</button>`;
  } else {
    titleHtml=`<button class="btn btn-sm" onclick="calDayDate.setDate(calDayDate.getDate()-1);rCalendar()">◀</button>
      <span style="font-size:15px;font-weight:600;min-width:200px;text-align:center;">${fmtKo(calDayDate)}</span>
      <button class="btn btn-sm" onclick="calDayDate.setDate(calDayDate.getDate()+1);rCalendar()">▶</button>
      <button class="btn btn-sm" onclick="calDayDate=new Date();rCalendar()">오늘</button>`;
  }
  return '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;">'
    +'<div style="display:flex;align-items:center;gap:6px;">'+titleHtml+'</div>'
    +'<div style="margin-left:auto;display:flex;gap:4px;">'
    +'<button class="btn btn-sm'+(calView==='month'?' btn-primary':'')+'" data-v="month" onclick="calSetView(this.dataset.v)">월</button>'
    +'<button class="btn btn-sm'+(calView==='week'?' btn-primary':'')+'" data-v="week" onclick="calSetView(this.dataset.v)">주</button>'
    +'<button class="btn btn-sm'+(calView==='day'?' btn-primary':'')+'" data-v="day" onclick="calSetView(this.dataset.v)">일</button>'
    +'</div>'
    +'</div>';
}

/* ── 월 달력 ── */
function rCalMonth(){
  const el=document.getElementById('panel-calendar');
  const days=['일','월','화','수','목','금','토'];
  const first=new Date(calYear,calMonth,1).getDay();
  const total=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();
  const shipOrders=getShipOrders(calYear,calMonth);

  let cells='';
  for(let i=0;i<first;i++)cells+='<div class="cal-day other"></div>';
  for(let d=1;d<=total;d++){
    const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d;
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayOrders=shipOrders.filter(o=>(o.shipped_date||o.dd||o.deadline)===ds);
    const notes=planNotes[ds]||[];

    // 발주 아이템 (드래그 가능)
    let itemsHtml='';
    dayOrders.forEach(o=>{
      const bg=o.shipped?'#e6f4ea':'#e8f0fe';
      const col=o.shipped?'#1e7e34':'#1a56c4';
      const label=(o.clientName||'')+' '+(o.productName||o.name);
      itemsHtml+='<div class="cal-item" draggable="true"'
        +' data-oid="'+o.id+'"'
        +' style="background:'+bg+';color:'+col+';cursor:grab;"'
        +' title="'+label+'"'
        +' ondragstart="calDragStart(event)"'
        +' ondragend="calDragEnd(event)"'
        +' onclick="event.stopPropagation();calItemClick(this)"'
        +'>'+label+'</div>';
    });
    if(notes.length) itemsHtml+='<div style="font-size:9px;color:#888;margin-top:2px;">📝 '+notes.length+'개 메모</div>';

    // 날짜 칸 (드롭 영역)
    cells+='<div class="cal-day'+(isToday?' today':'')+'"'
      +' data-ds="'+ds+'"'
      +' ondragover="calDragOver(event)"'
      +' ondragleave="calDragLeave(event)"'
      +' ondrop="calDropEl(event,this)"'
      +' onclick="calDayClick(this)"'
      +' style="cursor:pointer;">'
      +'<div class="cal-num">'+d+'</div>'
      +itemsHtml
      +'</div>';
  }

  el.innerHTML=calNavBar()
    +'<div class="cal-grid" style="margin-bottom:4px;">'+days.map(d=>'<div class="cal-hd">'+d+'</div>').join('')+'</div>'
    +'<div class="cal-grid" id="cal-grid-body">'+cells+'</div>'
    +(()=>{
      const today2=new Date();const ts=fmtD(today2);const tm=fmtD(new Date(today2.getTime()+86400000));
      const to=DB.orders.filter(o=>(o.shipped_date||o.dd||o.deadline)===ts);
      const tmr=DB.orders.filter(o=>(o.shipped_date||o.dd||o.deadline)===tm);
      const rh=o=>'<div class="crow" style="display:grid;grid-template-columns:2fr 1fr 1fr auto auto;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0ee;">'
        +'<span style="font-size:13px;font-weight:500;cursor:pointer;" data-oid="'+o.id+'" onclick="calItemClick(this)">'+(o.productName||o.name)+'</span>'
        +'<span>'+(o.clientName||'-')+'</span>'
        +'<span>'+(o.qty||0).toLocaleString()+'ea</span>'
        +'<div onclick="event.stopPropagation()">'+(o.status==="출고완료"||o.shipped?'<span class="badge badge-green">완료</span>':'<button class="btn btn-sm btn-success" data-oid="'+o.id+'" onclick="calMarkShipped(this)">출고완료</button>')+'</div>'
        +'<button class="btn btn-sm" data-oid="'+o.id+'" onclick="calQuoteModal(this)" style="font-size:11px;white-space:nowrap;">견적서</button>'
        +'</div>';
      return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem;">'
        +'<div class="card" style="margin:0;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><div class="sec" style="margin:0;">📦 금일 출고 목록</div><span style="font-size:12px;color:#888;">'+ts+'</span></div>'
        +(!to.length?'<div style="color:#aaa;font-size:13px;padding:8px 0;">오늘 출고 없음</div>':to.map(rh).join(''))
        +'</div>'
        +'<div class="card" style="margin:0;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><div class="sec" style="margin:0;">🚚 익일 출고 예정</div><span style="font-size:12px;color:#888;">'+tm+'</span></div>'
        +(!tmr.length?'<div style="color:#aaa;font-size:13px;padding:8px 0;">내일 출고 없음</div>':tmr.map(rh).join(''))
        +'</div>'
        +'</div>';
    })();
}

/* 달력 드래그앤드롭 */
let _calDragOid=null;

function calDayClick(el){var ds=el.dataset.ds;if(ds){calView='day';calDayDate=new Date(ds+'T12:00:00');rCalendar();}}
function calDropEl(e,el){var ds=el.dataset.ds;if(ds)calDrop(e,ds);}
function calItemClick(el){var oid=el.dataset.oid;if(oid)openOrderDetail(oid);}
function calMarkShipped(btn){var oid=btn.dataset.oid;if(oid)markShipped(oid);}
function calDragStart(e){
  _calDragOid=e.currentTarget.dataset.oid;
  e.currentTarget.style.opacity='0.5';
  e.dataTransfer.effectAllowed='move';
}
function calDragEnd(e){
  e.currentTarget.style.opacity='1';
  // 모든 하이라이트 제거
  document.querySelectorAll('.cal-day.drag-over').forEach(el=>{
    el.classList.remove('drag-over');
    el.style.background='';
  });
}
function calDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const cell=e.currentTarget;
  if(!cell.classList.contains('drag-over')){
    cell.classList.add('drag-over');
    cell.style.background='#fff3cd';
    cell.style.outline='2px dashed #f39c12';
  }
}
function calDragLeave(e){
  const cell=e.currentTarget;
  cell.classList.remove('drag-over');
  cell.style.background='';
  cell.style.outline='';
}
async function calDrop(e,ds){
  e.preventDefault();
  e.stopPropagation();
  // 모든 drag-over 정리
  document.querySelectorAll('.cal-day.drag-over').forEach(el=>{
    el.classList.remove('drag-over');
    el.style.background='';
    el.style.outline='';
  });
  if(!_calDragOid)return;
  const oid=_calDragOid;
  _calDragOid=null;
  const o=DB.orders.find(x=>x.id===oid);
  if(!o)return;
  const prevDate=o.shipped_date||o.dd||o.deadline||'';
  if(prevDate===ds)return; // 같은 날짜면 무시
  // DB 업데이트
  await api('orders','PATCH',{shipped_date:ds,deadline:ds},`id=eq.${oid}`);
  o.shipped_date=ds;o.dd=ds;
  toast('📅 출고일 변경: '+prevDate+' → '+ds);
  rCalMonth();
}

/* ── 주간 뷰 ── */
function rCalWeek(){
  const el=document.getElementById('panel-calendar');
  const mon=new Date(calDayDate);
  mon.setDate(mon.getDate()-((mon.getDay()+6)%7));
  const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(d.getDate()+i);return d;});
  const today=new Date();todayStr=fmtD(today);

  const rows=weekDays.map(d=>{
    const ds=fmtD(d);
    const dayOrders=getOrdersForDate(ds);
    const notes=planNotes[ds]||[];
    const isToday=ds===todayStr;
    const dayNames=['일','월','화','수','목','금','토'];
    return `<div style="border:1px solid ${isToday?'#1a1a1a':'#e8e8e4'};border-radius:8px;padding:10px 12px;margin-bottom:8px;background:${isToday?'#fafafa':'#fff'};">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:${isToday?'700':'600'};color:${isToday?'#1a1a1a':'#555'};">${d.getMonth()+1}/${d.getDate()} (${dayNames[d.getDay()]})</span>
        ${isToday?'<span class="badge badge-blue">오늘</span>':''}
        ${dayOrders.length?`<span class="badge badge-gray">${dayOrders.length}건 출고예정</span>`:''}
        <button class="btn btn-sm" style="margin-left:auto;" onclick="calView='day';calDayDate=new Date('${ds}T12:00:00');rCalendar()">상세 →</button>
      </div>
      ${dayOrders.map(o=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;background:#f8f8f6;border-radius:5px;margin-bottom:4px;font-size:12px;">
        <span style="flex:1;font-weight:500;">${o.productName||o.name}</span>
        <span style="color:#888;">${o.clientName||'-'}</span>
        <span>${(o.qty||0).toLocaleString()}ea</span>
        <span class="badge ${o.shipped?'badge-green':'badge-blue'}" style="font-size:10px;">${o.shipped?'완료':'예정'}</span>
      </div>`).join('')}
      ${notes.length?`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed #f0f0ee;">
        ${notes.slice(0,2).map(n=>`<div style="font-size:11px;color:#888;padding:2px 0;">📝 ${n.author?'['+n.author+'] ':''}${n.text.slice(0,50)}${n.text.length>50?'...':''}</div>`).join('')}
        ${notes.length>2?`<div style="font-size:11px;color:#aaa;">+${notes.length-2}개 더...</div>`:''}
      </div>`:''}
    </div>`;
  }).join('');

  el.innerHTML=calNavBar()+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">${rows}</div>`;
}

/* 노트 CRUD */
// 날짜별 출고 순서 관리
let _dayOrderSort={}; // {dateStr: [oid1, oid2, ...]}
let _dayDragSrc=null;

function getDayOrdersSorted(ds, orders){
  const sortArr=_dayOrderSort[ds];
  if(!sortArr||!sortArr.length)return orders;
  const sorted=[];
  // 저장된 순서대로
  sortArr.forEach(function(oid){
    const o=orders.find(x=>x.id===oid);
    if(o)sorted.push(o);
  });
  // 순서에 없는 것들은 뒤에 추가
  orders.forEach(function(o){
    if(!sorted.find(x=>x.id===o.id))sorted.push(o);
  });
  return sorted;
}

function dayOrderDragStart(e){
  _dayDragSrc=e.currentTarget;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.5';
}

function dayOrderDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const el=e.currentTarget;
  el.style.borderColor='#1a1a1a';
  el.style.borderStyle='dashed';
}

function dayOrderDragLeave(e){
  e.currentTarget.style.borderColor='#e8e8e4';
  e.currentTarget.style.borderStyle='solid';
}

function dayOrderDrop(e){
  e.preventDefault();
  e.stopPropagation();
  const target=e.currentTarget;
  target.style.borderColor='#e8e8e4';
  target.style.borderStyle='solid';
  if(!_dayDragSrc||_dayDragSrc===target)return;

  const ds=target.dataset.ds;
  const srcOid=_dayDragSrc.dataset.oid;
  const tgtOid=target.dataset.oid;

  // 현재 순서 가져오기
  const dayOrders=getOrdersForDate(ds);
  const sorted=getDayOrdersSorted(ds,dayOrders);
  const ids=sorted.map(o=>o.id);

  // 순서 변경
  const srcI=ids.indexOf(srcOid);
  const tgtI=ids.indexOf(tgtOid);
  if(srcI<0||tgtI<0)return;
  ids.splice(srcI,1);
  ids.splice(tgtI,0,srcOid);
  _dayOrderSort[ds]=ids;

  _dayDragSrc.style.opacity='1';
  _dayDragSrc=null;
  rCalDay();
}

async function saveJiryu(id, name, weights){

  if(id){
    await api('jiryu_db','PATCH',d,'id=eq.'+id);
    const j=DB.jiryuDB.find(x=>String(x.id)===String(id));
    if(j){j.name=name;j.w=weights;j.weights=weights;}

    // 중복 체크
    if(DB.jiryuDB.find(x=>x.name===name)){toast('"'+name+'" 지류가 이미 있어요');return;}
    const r=await api('jiryu_db','POST',d);

  closeMod();
  rJiryuTab();
  toast('저장 완료');
}

async function addWeightPrompt(id){

  const n=parseInt(w);
  if(isNaN(n)||n<=0){toast('올바른 숫자를 입력해주세요');return;}
  const j=DB.jiryuDB.find(x=>String(x.id)===String(id));
  if(!j)return;
  const ws=[...(j.w||[]).filter(x=>x!==0)];
  if(ws.includes(n)){toast(n+'g는 이미 있어요');return;}
  ws.push(n);
  ws.sort((a,b)=>a-b);
  await api('jiryu_db','PATCH',{weights:ws},'id=eq.'+id);
  j.w=ws;j.weights=ws;
  rJiryuTab();
  toast(n+'g 추가됐어요');
}

async function saveClient(id){
  const n=document.getElementById('cl-n').value.trim();
  if(!n){toast('업체명 필수');return;}

  // 중복 체크 (신규 등록 시)
  if(!id){
    const dup=DB.clients.find(x=>x.name.trim()===n);
    if(dup){
      // 경고창 표시
      const confirmed=window.confirm('⚠️ "'+n+'" 업체가 이미 등록되어 있습니다.\n\n기존 업체: '+dup.name+(dup.contact?' ('+dup.contact+')':'')+'\n\n그래도 추가하시겠습니까?');
      if(!confirmed)return;
    }
  }

  const clientType=document.getElementById('cl-type')?.value||'buyer';
  // 담당 공정 유형 수집
  const procTypeChks=document.querySelectorAll('.proc-type-chk:checked');
  const processTypes=Array.from(procTypeChks).map(c=>c.value).join(',');
  const d={
    name:n,
    contact:document.getElementById('cl-c').value,
    tel:document.getElementById('cl-t').value,
    email:document.getElementById('cl-e').value,
    addr:document.getElementById('cl-a').value,
    memo:document.getElementById('cl-m').value,
    client_type:clientType,
    process_types:processTypes||null
  };

  if(id){
    // 편집
    await api('clients','PATCH',d,`id=eq.${id}`);
    Object.assign(DB.clients.find(x=>x.id===id),d);
    // vendor이면 vendor_db도 동기화
    if(clientType==='vendor'&&processTypes){
      const pts=processTypes.split(',').filter(Boolean);
      for(const pt of pts){
        if(!gv(pt).includes(n)){
          await api('vendor_db','POST',{process_type:pt,name:n});
          if(!DB.vendorDB[pt])DB.vendorDB[pt]=[];
          DB.vendorDB[pt].push(n);
        }
      }
    }
    _fromOrder=false;
    closeMod();
    rClients();
    toast('저장 완료');
    return;
  }

  // 신규 등록
  const r=await api('clients','POST',d);
  if(!r||!r[0]){toast('저장 실패');return;}
  DB.clients.push(r[0]);
  // vendor이면 vendor_db에도 공정별 등록
  if(clientType==='vendor'&&processTypes){
    const pts=processTypes.split(',').filter(Boolean);
    for(const pt of pts){
      if(!gv(pt).includes(n)){
        await api('vendor_db','POST',{process_type:pt,name:n});
        if(!DB.vendorDB[pt])DB.vendorDB[pt]=[];
        DB.vendorDB[pt].push(n);
      }
    }
  }

  if(_fromOrder){
    // 발주 폼에서 호출된 경우: 모달 닫지 않고 발주 폼으로 돌아감
    _fromOrder=false;
    // 거래처 검색 input에 신규 업체명 자동 입력
    const searchEl=document.getElementById('eq-cl-search');
    if(searchEl){
      searchEl.value=r[0].name;
      // 발주 폼 EO 업데이트
      const eo=getEO();
      if(eo){eo.client_id=r[0].id;eo.clientName=r[0].name;}
      // 납품처 자동 채우기
      const daEl=document.getElementById('eq-da');
      if(daEl&&!daEl.value&&r[0].addr){daEl.value=r[0].addr;}
    }
    // 발주 폼 모달로 돌아가기 (거래처 등록 모달 닫기)
    // MOD를 직접 발주폼 이전 상태로 복원할 수 없으므로
    // 발주폼을 다시 열지 않고 그냥 모달만 교체
    closeMod();
    // 현재 편집중인 발주서 재오픈
    const eo2=getEO();
    const curOid2=curOid;
    openOrderForm(curOid2||null);
    toast('✅ "'+r[0].name+'" 거래처가 추가됐어요!');
    return;
  }

  closeMod();
  rClients();
  toast('저장 완료');
}

/* ══ 재발주 ══ */
function openReorderModal(){
  // 재발주 목록: 제품별 대표 1건만 표시
  // src_order_id 기준으로 그룹핑 → 원본 또는 가장 최신 재발주 1건
  const srcMap={};
  DB.orders.forEach(function(o){
    // 원본 id 결정: 재발주면 src_order_id, 아니면 자신의 id
    const srcId=o.src_order_id||o.id;
    if(!srcMap[srcId]){
      srcMap[srcId]=o;
    } else {
      // 더 최신 발주서로 교체
      const existing=srcMap[srcId];
      if((o.ordered||'')>=(existing.ordered||''))srcMap[srcId]=o;
    }
  });
  const reorderList=Object.values(srcMap).sort(function(a,b){
    return (b.ordered||'').localeCompare(a.ordered||'');
  });

  openMod('<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">'
    +'<span style="font-size:15px;font-weight:600;">재발주 — 기존 발주서 복사</span>'
    +'<button class="btn btn-sm" onclick="closeMod()">닫기</button></div>'
    +'<input placeholder="제품명 또는 거래처 검색..." oninput="filterReorder(this.value)" style="margin-bottom:12px;"/>'
    +'<div id="reorder-list">'
    +reorderList.map(function(o){
      const reorderCount=DB.orders.filter(x=>x.src_order_id===o.id||x.src_order_id===(o.src_order_id||o.id)).length;
      return '<div class="crow" style="cursor:pointer;display:grid;grid-template-columns:2fr 1fr 1fr auto;align-items:center;" data-oid="'+o.id+'" onclick="doReorder(this.dataset.oid)">'
        +'<div>'
        +'<div style="font-size:13px;font-weight:500;">'+(o.productName||o.name)+(o.is_reorder?'<span class="badge badge-amber" style="font-size:10px;margin-left:4px;">재발주</span>':'')+'</div>'
        +'<div style="font-size:11px;color:#888;">'+(o.clientName||'-')+' · '+(o.ordered||'')+(reorderCount>0?' · <span style="color:#1a56c4;">재발주 '+reorderCount+'회</span>':'')+'</div>'
        +'</div>'
        +'<span style="font-size:12px;">'+(o.procs||[]).map(function(p){return PM[p.type]?.name||'';}).join('→')+'</span>'
        +'<span>'+(o.qty||0).toLocaleString()+'ea</span>'
        +'<button class="btn btn-sm btn-primary">이 건으로 재발주</button>'
        +'</div>';
    }).join('')
    +'</div>');
}
function filterReorder(q){
  document.querySelectorAll('#reorder-list .crow').forEach(row=>{
    row.style.display=q?row.textContent.includes(q)?'grid':'none':'grid';
  });
}
function doReorder(oid){
  const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  closeMod();
  const copy=JSON.parse(JSON.stringify(o));
  // 스냅샷: 원본 공정 구성 저장 (변경 감지용)
  copy._srcId=oid;
  copy._srcSnapshot={
    procs:JSON.stringify((o.procs||[]).map(function(p){
      return {type:p.type,vendor:(p.vendor||'').trim()};
    })),
  };
  // 무조건 새 ID → 독립 발주서
  copy.id=null;
  copy.is_reorder=true;
  copy.src_order_id=oid;
  copy.ordered=new Date().toISOString().split('T')[0];
  copy.dd='';
  copy.status='대기';
  copy.shipped=false;
  copy.shipped_date=null;
  copy.project_id=null;
  copy.project_name=null;
  // 공정 초기화: 새 임시 id + is_done 리셋
  copy.procs=(copy.procs||[]).map(function(p,i){
    return Object.assign({},p,{
      id:'tmp_'+Date.now()+'_'+i,
      is_done:false,
      order_id:null
    });
  });
  window._editOrder=copy;
  openOrderForm(null); // null → 신규 발주 폼 (새 ID 생성)
  toast('📋 재발주 — 날짜/내용 수정 후 저장하세요.');
}


function reorderHasChanged(o){
  // 공정 구성(type+vendor)이 원본과 달라졌는지만 체크
  const snap=o._srcSnapshot;
  if(!snap)return false;
  const eo=window._editOrder||o;
  const curProcs=JSON.stringify((eo.procs||[]).map(function(p){
    return {type:p.type,vendor:(p.vendor||'').trim()};
  }));
  return curProcs!==snap.procs;
}

/* ══ 공정 빌더 ══ */
function autoR(procs){for(let i=0;i<procs.length;i++){if(!procs[i].routeAuto)continue;procs[i].route=i<procs.length-1?'→ '+(procs[i+1].vendor||PM[procs[i+1].type]?.name||''):'';}}
function rProcs(){
  const o=getEO();if(!o)return;
  if(!o.procs)o.procs=[];
  autoR(o.procs);
  const list=document.getElementById('PROCLIST');if(!list)return;
  list.innerHTML='';
  o.procs.forEach((p,i)=>{
    const div=document.createElement('div');div.className='pc';div.draggable=true;
    div.addEventListener('dragstart',e=>e.dataTransfer.setData('text/plain',String(i)));
    div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('dov');});
    div.addEventListener('dragleave',()=>div.classList.remove('dov'));
    div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('dov');const from=parseInt(e.dataTransfer.getData('text/plain'));if(from!==i){const t=o.procs[from];o.procs[from]=o.procs[i];o.procs[i]=t;rProcs();}});
    div.innerHTML=bPC(p,i);list.appendChild(div);
  });
  rFB();
}
function bPC(p,i){
  const m=PM[p.type]||{name:p.type,color:'#888',cls:'tt'};
  const isLast=i===(getEO()?.procs?.length||0)-1;
  const rt=p.routeAuto?`<span class="ra">자동</span>`:`<span class="rm">수동</span>`;
  return `<div class="pch"><span class="dh">⠿</span><span class="pb ${m.cls}">${m.name}</span>
    <span style="font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.vendor||'미입력'}</span>
    ${p.route?`<span style="font-size:11px;color:#888;white-space:nowrap;">${p.route} ${rt}</span>`:''}
    <div style="display:flex;gap:3px;flex-shrink:0;">
      <button class="btn btn-sm" onclick="pUp(${i})" ${i===0?'disabled style="opacity:0.3"':''}>↑</button>
      <button class="btn btn-sm" onclick="pDn(${i})" ${isLast?'disabled style="opacity:0.3"':''}>↓</button>
      <button class="btn btn-sm btn-danger" onclick="delP(${i})">삭제</button>
    </div></div>
  <div class="pcb">${p.type==='jiryu'?bJB(p,i):bGB(p,i)}</div>`;
}
function vSel(p,i,vl){

  return '<div><label>업체명</label>'
    +'<select onchange="onV('+i+',this.value)">'
    +vl.map(v=>'<option '+(p.vendor===v&&!isDirect?'selected':'')+'>'+v+'</option>').join('')

    +(!isDirect?'<button type="button" onclick="onVDBtn('+i+')" style="font-size:10px;padding:1px 7px;border:1px solid #d0d0cc;border-radius:4px;background:#fff;color:#888;cursor:pointer;margin-top:3px;display:block;">✏ 직접 입력</button>':'')
    +(isDirect?'<div class="dw"><input value="'+(p.vendor||'')+'" placeholder="직접 입력" id="vd-inp-'+i+'" oninput="onVDirect('+i+',this.value)"/></div>':'')
    +'</div>';
}
function rFld(p,i){

function bGB(p,i){
  const vl=gv(p.type);
  const SM={coating:['무광라미','유광라미','써멀무광','써멀유광','UV코팅'],foil:['유광금박','무광금박','유광은박','무광은박','홀로그램','별색박'],hapji:['양면합지','단면합지'],thomson:['신규목형','기존목형','목형 수정'],ssabari:['2단싸바리','3단싸바리','표지바리'],delivery:['자차','용차','택배(로젠)','택배(CJ)','직접수령'],carton:['단면골판지','양면골판지','이중양면골판지','삼중골판지'],material:['PP끈','철심','테이프','에어캡','수축필름','부자재 기타'],pyoji:['2단표지','3단표지','커스텀']};
  const SL={coating:'코팅 종류',foil:'박 종류',hapji:'합지 방식',thomson:'목형 여부',ssabari:'싸바리 종류',delivery:'배송 방법',carton:'카톤 종류',material:'부자재 종류',pyoji:'표지 종류'};
  let sub='';
  if(SM[p.type]){const sl=SM[p.type];
    // 기존 저장된 값이 목록에 없으면 직접입력 모드로 자동 전환
    if(p.subType!==undefined&&p.subType!==null&&p.subType!==''&&!sl.includes(p.subType)){p.subTypeDirect=true;}
    const sd=p.subTypeDirect||false;
    sub=`<div style="margin-bottom:8px;"><label>${SL[p.type]||''}</label>
      <select id="st-sel-${i}" onchange="onST(${i},this.value)">${sl.map(s=>`<option ${p.subType===s&&!sd?'selected':''}>${s}</option>`).join('')}
      <option value="__d__" ${sd?'selected':''}>직접 입력...</option></select>
      ${!sd?`<button type="button" onclick="onST(${i},'__d__')" style="font-size:10px;padding:1px 7px;border:1px solid #d0d0cc;border-radius:4px;background:#fff;color:#888;cursor:pointer;margin-top:3px;">✏ 직접 입력</button>`:''}
      ${sd?`<div class="dw"><input value="${p.subType||''}" placeholder="직접 입력" oninput="onSTDirect(${i},this.value)" id="st-direct-${i}"/></div>`:''}</div>`;}
  return `<div class="g2" style="margin-bottom:8px;">${vSel(p,i,vl)}
    <div><label>완료요청일 <span style="color:#aaa;">(선택)</span></label>
      <input type="date" value="${p.doneDate||''}" onchange="sP(${i},'doneDate',this.value)"/></div></div>

      </div>
    </div>
    ${rFld(p,i)}</div>`;
}
function bJB(p,i){
  const jsel=DB.jiryuDB.find(j=>j.name===p.jt)||DB.jiryuDB[0]||{w:[160],name:''};
  const isG=jsel.w[0]===0;

  const vO=gv('jiryu').map(v=>`<option ${p.vendor===v&&!isDirect?'selected':''}>${v}</option>`).join('');
  const wSz=p.w&&p.h&&Math.min(Number(p.w),Number(p.h))<393;
  const wQt=p.qty&&getEO()?.jq&&Number(p.qty)>Number(getEO().jq)*1.3;
  const rt=p.routeAuto?`<span class="ra">자동</span>`:`<span class="rm">수동</span>`;
  return `<div class="g2" style="margin-bottom:8px;">
    <div><label>지류 유통사</label>
      <select onchange="onV(${i},this.value)">${vO}<option value="__d__" ${isDirect?'selected':''}>직접 입력...</option></select>
      ${!isDirect?`<button type="button" onclick="onVDBtn(${i})" style="font-size:10px;padding:1px 7px;border:1px solid #d0d0cc;border-radius:4px;background:#fff;color:#888;cursor:pointer;margin-top:3px;display:block;">✏ 직접 입력</button>`:''}
      ${isDirect?`<div class="dw"><input value="${p.vendor||''}" placeholder="유통사 입력" id="vd-inp-${i}" oninput="onVDirect(${i},this.value)" onblur="onJVD(${i},this.value)"/></div>`:''}</div>
    <div><label>완료요청일 <span style="color:#aaa;">(선택)</span></label>
      <input type="date" value="${p.doneDate||''}" onchange="sP(${i},'doneDate',this.value)"/></div>
  </div>
  <div style="background:#f5f5f3;border-radius:6px;padding:10px;margin-bottom:8px;">

      <div style="min-width:120px;"><label>지류 선택</label>
        <select onchange="onJT(${i},this.value)">${DB.jiryuDB.map(j=>`<option ${p.jt===j.name?'selected':''}>${j.name}</option>`).join('')}
          <option value="__new__">+ 새 지류 추가</option></select></div>

        ${p.weightDirect?`<input type="number" style="width:65px;margin-top:3px;" value="${p.weight||''}" placeholder="g" id="wdirect-${i}" oninput="onWeightDirectInput(${i},this.value)" onchange="onWeightDirectInput(${i},this.value)"/>`:''}

    ${rFld(p,i)}</div>`;
}
function bJP(p){
  if(!p.jt&&!p.w)return '<span style="color:#aaa;">사양 입력 시 자동완성</span>';
  const j=DB.jiryuDB.find(x=>x.name===p.jt)||{w:[0]};

  const gr='';
  return `${p.vendor?'['+p.vendor+'] ':''}${p.jt||''} ${wt}${p.w&&p.h?p.w+'×'+p.h+gr:''}${p.qty?' = '+Number(p.qty).toLocaleString()+'매':''}`.trim()||'...';
}
function rFB(){
  const bar=document.getElementById('FLOWBAR');if(!bar)return;

function sP(i,f,v){const o=getEO();if(o?.procs?.[i])o.procs[i][f]=v;rProcs();}

function updateJiryuSpec(){
  const o=getEO();
  if(!o||!o.procs)return;
  const jiryuProcs=o.procs.filter(p=>p.type==='jiryu'&&p.jt);
  if(!jiryuProcs.length)return;
  const specLines=jiryuProcs.map(p=>{
    const j=DB.jiryuDB.find(x=>x.name===p.jt)||{w:[0]};
    const wt=p.weight?p.weight+'g ':'';
    const dim=p.w&&p.h?p.w+'×'+p.h:'';
    const qty=p.qty?'= '+Number(p.qty).toLocaleString()+'매':'';
    return [p.vendor?'['+p.vendor+'] ':'',p.jt,' ',wt,dim,' ',qty].join('').trim();
  });
  const el=document.getElementById('eq-js');
  if(el)el.value=specLines.join(' / ');

function togNoteEmphasis(i){const p=getEO()?.procs?.[i];if(p){p.noteEmphasis=!p.noteEmphasis;rProcs();}}
function onWeightSel(i,v){

function onV(i,v){
  const p=getEO()?.procs?.[i];if(!p)return;
  if(v==='__d__'){
    p.vendorDirect=true;p.vendor='';
    rProcs();
    setTimeout(()=>{const el=document.getElementById('vd-inp-'+i);if(el)el.focus();},60);

function onVDBtn(i){onV(i,'__d__');}
function onVDirect(i,v){

  const p=getEO()?.procs?.[i];if(p){p.vendor=v;autoR(getEO().procs);}
}
function onVD(i,v){
  const p=getEO()?.procs?.[i];if(!p)return;
  p.vendor=v;
  if(v&&!gv(p.type).includes(v)){
