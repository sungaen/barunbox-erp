    api('vendor_db','POST',{process_type:p.type,name:v}).then(()=>{
      if(!DB.vendorDB[p.type])DB.vendorDB[p.type]=[];
      if(!DB.vendorDB[p.type].includes(v))DB.vendorDB[p.type].push(v);
    });
    // clients에도 upsert (이름 기준)
    upsertVendorClient(v, p.type);
  }
  autoR(getEO().procs);
}

// 공정 업체명 입력 시 clients(vendor)에 자동 upsert
async function upsertVendorClient(name, processType){
  if(!name||!processType)return;
  // 이미 있는지 확인
  const existing=DB.clients.find(c=>c.name===name&&(c.client_type==='vendor'||c.client_type==='발주처'));
  if(existing){
    // 기존 업체에 공정 유형 추가
    const pts=(existing.process_types||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!pts.includes(processType)){
      pts.push(processType);
      const newPts=pts.join(',');
      await api('clients','PATCH',{process_types:newPts},`id=eq.${existing.id}`);
      existing.process_types=newPts;
      toast('"'+name+'" 발주처 공정 업데이트됐어요');
    }
  } else {
    // 신규 발주처 자동 등록
    const r=await api('clients','POST',{name,client_type:'vendor',process_types:processType});
    if(r&&r[0]){
      DB.clients.push(r[0]);
      toast('"'+name+'" 발주처 자동 등록됐어요!');
    }
  }
}

}

function onRouteInput(i,v){
  const p=getEO()?.procs?.[i];if(!p)return;

  // 입력한 업체명이 vendor_db에 있으면 자동 공정 추가 제안
  if(!v)return;

  const nextIdx=i+1;

  const newProc={id:'tmp_'+Date.now(),type:procType,vendor:v,vendorDirect:false,

    ssabari:'2단싸바리',delivery:'자차',carton:'',material:'',pyoji:'2단표지'};
  if(SM2[procType])newProc.subType=SM2[procType];
  // i+1 위치에 삽입
  procs.splice(nextIdx,0,newProc);
  autoR(procs);

function getVendorFirstProcess(vendorName){
  if(!vendorName)return null;
  const name=vendorName.trim();
  // vendor_db에서 해당 업체명의 첫 번째 공정 찾기
  for(const [procType,vendors] of Object.entries(DB.vendorDB)){
    if(procType==='jiryu')continue; // 지류 유통사는 공정으로 추가 안 함
    if(vendors.includes(name))return procType;
  }
  // clients DB에서 process_types 확인
  const client=DB.clients.find(c=>c.name===name&&(c.client_type==='vendor'||c.client_type==='발주처'));
  if(client&&client.process_types){
    const pts=client.process_types.split(',').map(s=>s.trim()).filter(s=>s&&s!=='jiryu');
    if(pts.length)return pts[0];
  }
  return null;
}

function openMoldPickerForRow(rowIdx){
  const row=document.getElementById('calrow-'+rowIdx);if(!row)return;

  // 기존 패널 토글
  const existPanel=document.getElementById('mold-picker-panel-'+rowIdx);
  if(existPanel){
    existPanel.style.display=existPanel.style.display==='none'?'block':'none';
    if(existPanel.style.display!=='none')renderMoldPicker('',rowIdx);
    return;
  }

  // 인라인 패널 생성 (모달 X → 발주 폼 안에 표시)
  const panel=document.createElement('div');
  panel.id='mold-picker-panel-'+rowIdx;
  panel.style.cssText='border:1px solid #e8e8e4;border-radius:8px;padding:10px;margin-top:6px;background:#fff;';

  const w=row.querySelector('.cal-w')?.value||'';
  const h=row.querySelector('.cal-h')?.value||'';
  const cl=DB.clients.find(x=>x.id===document.getElementById('eq-cl')?.value);
  const initQ=(cl?.name||'')+' '+(w&&h?w+'*'+h:'');

  panel.innerHTML=
    '<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">'
    +'<div style="position:relative;flex:1;">'
    +'<input id="mpicker-q-'+rowIdx+'" placeholder="업체명, 품명, 칼사이즈 검색..." value="'+initQ.trim()+'"'
    +' oninput="renderMoldPicker(this.value,'+rowIdx+')" style="padding-left:28px;font-size:12px;"/>'
    +'<span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#aaa;font-size:12px;">🔍</span>'
    +'</div>'
    +'<button data-ridx="'+rowIdx+'" onclick="closeMoldPanel(this)" style="padding:4px 8px;border:1px solid #d0d0cc;border-radius:4px;background:#fff;cursor:pointer;font-size:11px;">닫기</button>'
    +'</div>'
    +'<div id="mpicker-list-'+rowIdx+'" style="max-height:220px;overflow-y:auto;border:1px solid #f0f0ee;border-radius:6px;"></div>'
    +'<div style="margin-top:6px;font-size:11px;color:#aaa;">목형이 없으면 저장 시 자동 생성됩니다</div>';

  // mold-linked 다음에 삽입
  const linkedEl=document.getElementById('mold-linked-'+rowIdx);
  if(linkedEl)linkedEl.insertAdjacentElement('afterend',panel);
  else row.appendChild(panel);

  renderMoldPicker(initQ.trim(), rowIdx);
}

function renderMoldPicker(q, rowIdx){
  if(rowIdx===undefined)rowIdx=0;
  const el=document.getElementById('mpicker-list-'+rowIdx);if(!el)return;
  const qLow=(q||'').toLowerCase().trim();
  const filtered=molds.filter(m=>{
    if(!qLow)return true;
    return [m.client,m.product,m.size,m.code].join(' ').toLowerCase().includes(qLow);
  }).slice(0,30);

  if(!filtered.length){
    el.innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">검색 결과가 없어요</div>';
    return;
  }

  el.innerHTML=filtered.map(m=>{
    const linked=window._linkedMolds&&Object.values(window._linkedMolds).find(x=>x&&x.id===m.id);
    return `<div onclick="linkMoldToRow(${rowIdx},${m.id})" style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0f0ee;cursor:pointer;background:${linked?'#e6f4ea':'#fff'};" onmouseover="this.style.background='${linked?'#d4edda':'#f8f8f6'}'" onmouseout="this.style.background='${linked?'#e6f4ea':'#fff'}'">
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:500;">${m.product||''} ${linked?'<span style="font-size:10px;color:#1e7e34;">✓ 연결됨</span>':''}</div>
        <div style="font-size:11px;color:#888;">${m.client||''} · ${m.size||'-'}</div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:11px;padding:2px 7px;border-radius:8px;background:#f1f1ee;color:#555;">${m.current_location||'미확인'}</div>
        <div style="font-size:10px;color:#aaa;margin-top:2px;">#${m.id}</div>
      </div>
    </div>`;
  }).join('');
}

function linkMoldToRow(rowIdx, moldId){
  const m=molds.find(x=>x.id===moldId);if(!m)return;
  if(!window._linkedMolds)window._linkedMolds={};
  window._linkedMolds[rowIdx]=m;

  // 칼규격 자동 채우기: size 예) "958*687[2조]", "814*566[1조+패드]" 파싱
  const row=document.getElementById('calrow-'+rowIdx);
  if(row&&m.size){
    const sizeMatch=m.size.match(/^(\d+)[*×x](\d+)/);
    if(sizeMatch){
      const wEl=row.querySelector('.cal-w');
      const hEl=row.querySelector('.cal-h');
      if(wEl)wEl.value=sizeMatch[1]; // 항상 덮어쓰기
      if(hEl)hEl.value=sizeMatch[2];
    }
    // 조수 파싱: "[2조]", "[1조+패드]" → 숫자만 추출
    const joMatch=m.size.match(/\[(\d+)조/);
    if(joMatch){
      const joEl=row.querySelector('.cal-jo');
      if(joEl){
        const joVal=joMatch[1]+'조';
        Array.from(joEl.options).forEach(function(opt){
          if(opt.value===joVal||opt.textContent===joVal)joEl.value=opt.value;
        });
      }
    }
    // 메모 파싱: "+" 이후 내용 (예: "+패드")
    const memoMatch=m.size.match(/\[\d+조\+(.+?)\]/);
    if(memoMatch){
      const memoEl=row.querySelector('.cal-memo');
      if(memoEl&&!memoEl.value)memoEl.value=memoMatch[1];
    }
    // 제목(title)에 목형 품명 표시
    const titleEl=row.querySelector('.cal-title');
    if(titleEl&&!titleEl.value)titleEl.value=m.product||'';
    // 정매 자동 재계산
    recalcJq(rowIdx);
    syncCalMain();
  }

  // 해당 행에 연결 표시
  const linkedEl=document.getElementById('mold-linked-'+rowIdx);
  if(linkedEl){
    linkedEl.innerHTML='<span style="display:inline-flex;align-items:center;gap:5px;padding:2px 8px;background:#e6f4ea;border-radius:10px;color:#1e7e34;font-size:11px;">'
      +'🗂 #'+m.id+' '+m.product+' ('+(m.size||'-')+') · '+m.current_location
      +'<span onclick="clearMoldLink('+rowIdx+')" style="cursor:pointer;color:#c0392b;font-weight:600;margin-left:4px;">✕</span>'
      +'</span>';
  }

  // 목형 피커 패널 닫기 (모달은 유지!)
  const pickerEl=document.getElementById('mold-picker-panel-'+rowIdx);
  if(pickerEl)pickerEl.style.display='none';
  const pickerBtn=document.getElementById('mold-picker-btn-'+rowIdx);
  if(pickerBtn)pickerBtn.textContent='🗂 목형 ✓';

  toast('목형 #'+m.id+' 연결됐어요');
}

function closeMoldPanel(btn){var i=btn.dataset.ridx;var el=document.getElementById("mold-picker-panel-"+i);if(el)el.style.display="none";}
function clearMoldLink(rowIdx){
  if(window._linkedMolds)delete window._linkedMolds[rowIdx];
  const linkedEl=document.getElementById('mold-linked-'+rowIdx);
  if(linkedEl)linkedEl.innerHTML='';
  // 목형 피커 버튼 원래대로

  toast('목형 연결 해제됐어요');
}

function mlb(loc){
  const s={'창고':'background:#e8f0fe;color:#1a56c4;','폐기':'background:#fde8e8;color:#c0392b;','업체전달':'background:#e6f4ea;color:#1e7e34;'};

}

function mf(){
  const q=(document.getElementById('ms')?.value||'').toLowerCase().trim();
  const loc=document.getElementById('ml')?.value||'';
  const co=document.getElementById('mc2')?.value||'';
  moldFiltered=molds.filter(m=>{
    if(loc&&m.current_location!==loc)return false;
    if(co&&m.company!==co)return false;
    if(q&&![m.client,m.product,m.code,m.company,m.size,m.note].join(' ').toLowerCase().includes(q))return false;
    return true;
  });
  moldPage=1;rmt();
}
function mr(){document.getElementById('ms').value='';document.getElementById('ml').value='';document.getElementById('mc2').value='';mf();}

function rmt(){
  const tb=document.getElementById('mtb');const em=document.getElementById('me');if(!tb)return;
  const total=moldFiltered.length;const tp=Math.max(1,Math.ceil(total/MOLD_PAGE));
  if(moldPage>tp)moldPage=tp;
  if(total===0){tb.innerHTML='';if(em)em.style.display='';document.getElementById('mp2').innerHTML='';return;}
  if(em)em.style.display='none';
  const st=(moldPage-1)*MOLD_PAGE;
  tb.innerHTML=moldFiltered.slice(st,st+MOLD_PAGE).map(m=>{
    const lh=m.history&&m.history.length>0?m.history[m.history.length-1]:null;
    const ld=lh?.moved_date?lh.moved_date.slice(0,10).replace(/-/g,'.'):'-';
    return `<tr onclick="omd(${m.id})" style="cursor:pointer;border-bottom:0.5px solid #f0f0ee;">
      <td style="padding:8px 12px;font-size:13px;">${m.id}</td>
      <td style="padding:8px 12px;font-size:12px;color:#888;">${m.company||''}</td>

async function amm(mid){
  let loc=document.getElementById('mvl')?.value;
  if(loc==='__c__')loc=document.getElementById('mcl')?.value?.trim();
  const date=document.getElementById('mvd')?.value;
  const reason=document.getElementById('mvr')?.value||'수동이동';
  if(!loc){toast('위치를 선택하거나 입력해주세요.');return;}
  if(!date){toast('날짜를 입력해주세요.');return;}
  await api('mold_movements','POST',{mold_id:mid,location:loc,moved_date:date,reason});
  await api('molds','PATCH',{current_location:loc},`id=eq.${mid}`);
  await syncMolds();toast(`목형 #${mid} → ${loc} 이동 완료`);omd(mid);
}

async function dmh(hid,mid){
  if(!confirm('이 이력을 삭제할까요?'))return;
  await api('mold_movements','DELETE',null,`id=eq.${hid}`);
  const rem=await api('mold_movements','GET',null,`mold_id=eq.${mid}&order=moved_date.asc`);
  const newLoc=rem&&rem.length>0?rem[rem.length-1].location:'미확인';
  await api('molds','PATCH',{current_location:newLoc},`id=eq.${mid}`);
  await syncMolds();toast('이력 삭제됨');omd(mid);
}

async function delmold(mid){

async function smn(){

  const d={company:document.getElementById('ma-co').value,code:document.getElementById('ma-cd').value.trim(),client,product,size:document.getElementById('ma-sz').value.trim(),dimensions:document.getElementById('ma-dm').value.trim(),dongpan:document.getElementById('ma-dp').value.trim(),note:document.getElementById('ma-nt').value.trim(),current_location:loc};

    await syncMolds();closeMod();toast(`목형 #${res[0].id} 등록 완료!`);rMolds();

async function autoLinkMold(vendor,clientName,productName,orderId){
  if(!vendor||!clientName)return;
  const matched=molds.filter(m=>{
    const cm=m.client&&(m.client===clientName||clientName.includes(m.client)||m.client.includes(clientName));
    const pm=m.product&&productName&&(m.product===productName||productName.includes(m.product)||m.product.includes(productName));
    return cm&&pm;
  });
  if(matched.length===0)return;
  const today=new Date().toISOString().split('T')[0];
  if(matched.length===1){
    const m=matched[0];
    if(m.current_location!==vendor){
      await api('mold_movements','POST',{mold_id:m.id,location:vendor,moved_date:today,reason:'발주연동',order_id:orderId});
      await api('molds','PATCH',{current_location:vendor},`id=eq.${m.id}`);
      await syncMolds();
      toast(`🗂 목형 #${m.id} → ${vendor} 자동 이동`);
    }
  }
}

function mex(){

  const csv=rows.map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});

}

    }
  } else if(totalEl){totalEl.textContent='';}
}

function onFilesSelected(input){

async function uploadOrderFile(oid,file){
  try{
    const path=oid+'/'+Date.now()+'_'+file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const res=await fetch(SUPA_URL+'/storage/v1/object/'+STORAGE_BUCKET+'/'+path,{
      method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':file.type||'application/octet-stream'},body:file
    });
    return res.ok;
  }catch(e){return false;}
}
async function loadAttachedFiles(oid,targetElId){
  const el=document.getElementById(targetElId);if(!el)return;
  try{
    const res=await fetch(SUPA_URL+'/storage/v1/object/list/'+STORAGE_BUCKET+'/'+oid,{
      method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json'},body:JSON.stringify({limit:50,offset:0})
    });
    if(!res.ok){el.innerHTML='';return;}
    const files=await res.json();
    if(!files||!files.length){el.innerHTML='<div style="font-size:11px;color:#aaa;">첨부파일 없음</div>';return;}
    el.innerHTML='<div style="font-size:11px;color:#888;font-weight:600;margin-bottom:4px;">첨부파일 ('+files.length+'개)</div>'
      +files.map(f=>{
        const url=SUPA_URL+'/storage/v1/object/public/'+STORAGE_BUCKET+'/'+oid+'/'+f.name;
        const dispName=f.name.replace(/^\d+_/,'');
        return '<div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:#f5f5f3;border-radius:6px;margin-bottom:3px;font-size:12px;">'
          +'<span>'+fileIcon(f.name)+'</span>'
          +'<a href="'+url+'" target="_blank" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a56c4;text-decoration:none;">'+dispName+'</a>'
          +'<button data-oid="'+oid+'" data-fname="'+f.name+'" data-tid="'+targetElId+'" onclick="delFileBtn(this)" style="color:#c0392b;background:none;border:none;cursor:pointer;font-size:13px;">✕</button>'
          +'</div>';
      }).join('');
  }catch(e){el.innerHTML='';}
}
function delFileBtn(btn){deleteOrderFile(btn.dataset.oid,btn.dataset.fname,btn.dataset.tid);}
async function deleteOrderFile(oid,fname,targetElId){
  if(!confirm('파일을 삭제할까요?'))return;
  await fetch(SUPA_URL+'/storage/v1/object/'+STORAGE_BUCKET+'/'+oid+'/'+fname,{method:'DELETE',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  toast('파일 삭제됨');loadAttachedFiles(oid,targetElId);
}
function fileIcon(name){const ext=(name.split('.').pop()||'').toLowerCase();return {pdf:'📄',ai:'🎨',psd:'🎨',eps:'🎨',svg:'🎨',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',zip:'📦'}[ext]||'📎';}
function formatFileSize(b){if(!b)return'';if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB';}

async function dashRefresh(){

  if(curTab==='dashboard'){

function dUpdateSync(){

    const n=new Date();
    el.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')+':'+n.getSeconds().toString().padStart(2,'0');

function dGetDaysLeft(s){if(!s)return null;return Math.ceil((new Date(s)-new Date())/(1000*60*60*24));}

function dAnimCount(id,target){
  const el=document.getElementById(id);if(!el)return;
  const unit=el.querySelector('span')?.outerHTML||'<span>건</span>';
  let cur=0;const step=Math.max(1,Math.ceil(target/20));
  const iv=setInterval(()=>{cur=Math.min(cur+step,target);el.innerHTML=cur+unit;if(cur>=target)clearInterval(iv);},40);
}

function dRenderKPI(todayStr){
  const orders=DB.orders.filter(o=>o.status!=='출고완료');
  const total=orders.length;
  const ing=orders.filter(o=>o.status==='진행중').length;
  const ready=orders.filter(o=>o.status==='생산완료대기').length;
  const urgent=orders.filter(o=>{const d=dGetDaysLeft(o.deadline||o.shipped_date);return d!==null&&d<=-2;}).length;
  const todayShip=orders.filter(o=>(o.shipped_date||o.deadline)===todayStr).length;
  dAnimCount('d-kpi-total',total);
  dAnimCount('d-kpi-ing',ing);
  dAnimCount('d-kpi-ready',ready);
  dAnimCount('d-kpi-urgent',urgent);
  dAnimCount('d-kpi-today',todayShip);
  const ts=document.getElementById('d-kpi-total-sub');if(ts)ts.textContent='대기 '+orders.filter(o=>o.status==='대기').length+'건 포함';
  const is=document.getElementById('d-kpi-ing-sub');if(is)is.textContent=ing+'건 공정 진행중';
  const us=document.getElementById('d-kpi-urgent-sub');if(us)us.textContent=urgent>0?'즉시 확인 필요':'정상';
}

function dRenderPipe(){
  const grid=document.getElementById('d-pipe-grid');if(!grid)return;
  const active=DB.orders.filter(o=>o.status!=='대기'&&o.status!=='출고완료');
  const types=['jiryu','print','coating','hapji','thomson','ssabari','jeopchak','assembly','carton','material','pyoji'];
  const map={};types.forEach(t=>{map[t]=[];});
  active.forEach(o=>{
    const procs=o.procs||[];
    const curPs=getActiveProcs(procs);
    curPs.forEach(function(p){if(map[p.type])map[p.type].push(o);});
  });
  const maxC=Math.max(1,...Object.values(map).map(v=>v.length));
  grid.innerHTML=types.map(t=>{
    const m=DPM[t];const items=map[t];const pct=Math.round(items.length/maxC*100);
    return '<div class="d-pipe-col">'
      +'<div class="d-pipe-head" style="background:'+m.color+'22;color:'+m.color+';border:1px solid '+m.color+'33;">'+m.name+'</div>'
      +'<div class="d-pipe-cnt">'+items.length+'</div>'
      +'<div style="font-size:9px;color:#4a5568;text-align:center;">건</div>'
      +'<div class="d-pipe-bar-wrap"><div class="d-pipe-bar" style="width:'+pct+'%;background:'+m.color+';"></div></div>'
      +'<div class="d-pipe-items">'+items.slice(0,5).map(o=>'<div class="d-pipe-item" style="border-left-color:'+m.color+';" title="'+(o.productName||o.name||'')+'">'+((o.clientName||'')+' '+(o.productName||o.name||'').slice(0,7)).trim()+'</div>').join('')
      +(items.length>5?'<div style="font-size:9px;color:#4a5568;text-align:center;padding:2px;">+'+( items.length-5)+'건</div>':'')
      +'</div></div>';
  }).join('');
}

function dRenderVendors(){
  const map={};
  DB.orders.filter(o=>o.status!=='출고완료').forEach(o=>{
    const procs=o.procs||[];
    const curPs=getActiveProcs(procs);
    curPs.forEach(function(p){
      if(!p.vendor)return;
      if(!map[p.vendor])map[p.vendor]={items:[],types:new Set()};
      if(!map[p.vendor].items.find(x=>x.id===o.id))map[p.vendor].items.push(o);
      map[p.vendor].types.add(p.type);
    });
  });
  const vendors=Object.entries(map).sort((a,b)=>b[1].items.length-a[1].items.length);
  const cnt=document.getElementById('d-vendor-cnt');if(cnt)cnt.textContent=vendors.length+'개 업체';
  const list=document.getElementById('d-vendor-list');if(!list)return;
  if(!vendors.length){list.innerHTML='<div style="font-size:11px;color:#4a5568;padding:8px;">진행중 업체 없음</div>';return;}
  list.innerHTML=vendors.slice(0,10).map(([name,data])=>{
    const types=Array.from(data.types);const m=DPM[types[0]]||{name:types[0],color:'#888'};
    return '<div class="d-vendor-row">'
      +'<div class="d-vendor-nm">'+name+'</div>'
      +'<div class="d-vendor-proc" style="background:'+m.color+'22;color:'+m.color+';">'+types.map(t=>DPM[t]?.name||t).join('·')+'</div>'
      +'<div class="d-vendor-cnt">'+data.items.length+'건</div>'
      +'</div>';
  }).join('');
}

function dRenderOrders(){
  let orders=DB.orders.filter(o=>o.status!=='출고완료');
  if(dashFilter==='urgent') orders=orders.filter(o=>{const d=dGetDaysLeft(o.deadline||o.shipped_date);return d!==null&&d<=-2;});
  else if(dashFilter!=='all') orders=orders.filter(o=>o.status===dashFilter);
  orders.sort((a,b)=>(dGetDaysLeft(a.deadline||a.shipped_date)??9999)-(dGetDaysLeft(b.deadline||b.shipped_date)??9999));
  const tbody=document.getElementById('d-order-tbody');if(!tbody)return;
  if(!orders.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:#4a5568;">해당 발주 없음</td></tr>';return;}
  tbody.innerHTML=orders.slice(0,25).map(o=>{
    const procs=o.procs||[];const ci=procs.findIndex(p=>!p.is_done);
    const done=procs.filter(p=>p.is_done).length;
    const pct=procs.length?Math.round(done/procs.length*100):0;
    const dl=dGetDaysLeft(o.deadline||o.shipped_date);
    const smap={'대기':'d-sw 대기','진행중':'d-si 진행중','생산완료대기':'d-sr 출고대기','출고완료':'d-sd 완료'};
    const [sc,sl]=(smap[o.status]||'d-sw '+(o.status||'대기')).split(' ');
    const ddCls=dl!==null?(dl<=-2?'d-dd-over':dl<=0?'d-dd-near':''):'';
    const ddTxt=dl===null?'-':dl<0?'D+'+ Math.abs(dl):dl===0?'D-Day':'D-'+dl;
    const flow=procs.map((p,i)=>{const m=DPM[p.type]||{color:'#888',name:p.type};const cc=p.is_done?'done':i===ci?'cur':'';return '<span class="d-chip '+cc+'" style="background:'+m.color+(p.is_done?'22':'33')+';color:'+m.color+';">'+m.name+'</span>';}).join('');
    return '<tr>'
      +'<td class="dn">'+(o.productName||o.name||'').slice(0,10)+'</td>'
      +'<td>'+(o.clientName||'-').slice(0,6)+'</td>'
      +'<td><div class="d-proc-flow">'+(flow||'<span style="color:#4a5568;font-size:9px;">없음</span>')+'</div></td>'
      +'<td style="font-family:monospace;font-size:10px;">'+(o.qty||0).toLocaleString()+'</td>'
      +'<td class="'+ddCls+'" style="font-family:monospace;font-size:10px;">'+ddTxt+'</td>'
      +'<td><span class="d-sbadge '+sc+'">'+sl+'</span></td>'
      +'<td><div class="d-pbar-wrap"><div class="d-pbar"><div class="d-pbar-fill" style="width:'+pct+'%;"></div></div><span class="d-pbar-pct">'+pct+'%</span></div></td>'
      +'</tr>';
  }).join('');
}

function dRenderShip(todayStr,tmrStr){
  const toO=DB.orders.filter(o=>(o.shipped_date||o.deadline)===todayStr);
  const tmO=DB.orders.filter(o=>(o.shipped_date||o.deadline)===tmrStr);
  const mkItem=o=>'<div class="d-ship-item">'
    +'<div><div class="d-ship-nm">'+(o.productName||o.name||'').slice(0,12)+'</div>'
    +'<div class="d-ship-cl">'+(o.clientName||'-')+'</div></div>'
    +'<div class="d-ship-qty">'+(o.qty||0).toLocaleString()+'ea</div>'
    +'<button class="d-ship-btn'+(o.status==='출고완료'?' done':'')+'" data-oid="'+o.id+'" onclick="dMarkShipped(this)">'+(o.status==='출고완료'?'완료':'출고완료')+'</button>'
    +'</div>';
  const te=document.getElementById('d-ship-today');
  if(te)te.innerHTML=toO.length?toO.map(mkItem).join(''):'<div style="font-size:10px;color:#4a5568;padding:6px 8px;">오늘 출고 없음</div>';
  const me=document.getElementById('d-ship-tmr');
  if(me)me.innerHTML=tmO.length?tmO.map(mkItem).join(''):'<div style="font-size:10px;color:#4a5568;padding:6px 8px;">내일 출고 없음</div>';
}

async function dMarkShipped(btn){
  if(btn.classList.contains('done'))return;
  const oid=btn.dataset.oid;if(!oid)return;
  const today=new Date().toISOString().split('T')[0];
  await api('orders','PATCH',{status:'출고완료',shipped:true,shipped_date:today},`id=eq.${oid}`);
  const o=DB.orders.find(x=>x.id===oid);
  if(o){o.status='출고완료';o.shipped=true;}
  btn.textContent='완료';btn.classList.add('done');
  dRenderKPI(today);
  toast('✓ 출고 완료 처리됐어요');
}

function saveClientModal(){
  const idEl=document.getElementById('cl-modal-id');
  const id=idEl?idEl.value.trim():'';
  saveClient(id||null);
}
function onWeightDirectInput(i,v){
  const p=getEO()?.procs?.[i];
  if(!p)return;
  // 타이핑 중: rProcs 없이 값만 저장 (포커스 유지)
  p.weight=v===''?'':parseInt(v)||v;
  // 지류사양 300ms 디바운스 업데이트
  clearTimeout(window._weightTimer);
  window._weightTimer=setTimeout(updateJiryuSpec,300);
}
</script>
